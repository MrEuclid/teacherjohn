<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prime Number Mastery</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        .header-section { margin-top: 20px; margin-bottom: 20px; }
        .game-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: none; }
        
        /* Star Tracking */
        .star-container { min-height: 25px; font-size: 1.3rem; letter-spacing: 2px; }
        
        /* The Prime Number Buttons */
        .prime-btn {
            border-radius: 12px;
            font-size: 1.5rem;
            font-weight: bold;
            width: 70px;
            height: 70px;
            margin: 5px;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        
        .prime-btn:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        /* Interactive Equation Input Boxes */
        .equation-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 2.5rem;
            font-weight: bold;
            margin: 20px 0;
        }

        .input-box {
            width: 100px;
            height: 90px;
            border: 4px solid #ced4da;
            border-radius: 15px;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0d6efd;
            cursor: pointer;
            transition: all 0.2s;
        }

        .input-box.active {
            border-color: #ffc107;
            background-color: #fffde7;
            box-shadow: 0 0 15px rgba(255, 193, 7, 0.4);
            transform: scale(1.05);
        }

        .op-symbol { color: #6c757d; }
        .target-box { color: #dc3545; }
        
        #guessesArea { max-height: 150px; overflow-y: auto; }
        .guess-log { font-size: 1.2rem; margin-bottom: 5px; color: #6c757d; }
    </style>
</head>

<body>

<div class="p-3">
    <a href="/index.php" class="btn btn-outline-secondary fw-bold shadow-sm">
        ← Back to Home
    </a>
</div>

<div class="container pb-5">
    <div class="header-section text-center">
        <h1 class="display-5 fw-bold text-primary">Prime Number Mastery</h1>
        <p class="text-muted fs-5">Can you solve the equations using only prime numbers?</p>
    </div>

    <div class="row justify-content-center mb-4 text-center">
        <div class="col-lg-10">
            <h4 class="text-secondary mb-3" id="difficultyPrompt">1. Select your difficulty:</h4>
            <div class="d-flex justify-content-center gap-3">
                <button id="btnEasy" class="btn btn-success btn-lg px-4 fw-bold">Easy (Primes < 20)</button>
                <button id="btnMedium" class="btn btn-warning btn-lg px-4 fw-bold text-dark">Medium (Primes < 50)</button>
                <button id="btnHard" class="btn btn-danger btn-lg px-4 fw-bold">Hard (Primes < 100)</button>
            </div>
        </div>
    </div>

    <div id="gameSection" style="display:none;">
        <hr class="my-4">
        
        <div class="row justify-content-center mb-4 text-center">
            <div class="col-lg-10">
                <h4 class="text-secondary mb-3">2. Choose an operation:</h4>
                <div class="row g-3">
                    <div class="col-md-3">
                        <button id="opAdd" class="btn btn-outline-primary w-100 fw-bold fs-4 op-btn" data-op="+">+ Add</button>
                        <div id="starsAdd" class="star-container mt-2 text-warning"></div>
                    </div>
                    <div class="col-md-3">
                        <button id="opSub" class="btn btn-outline-primary w-100 fw-bold fs-4 op-btn" data-op="-">- Subtract</button>
                        <div id="starsSub" class="star-container mt-2 text-warning"></div>
                    </div>
                    <div class="col-md-3">
                        <button id="opMul" class="btn btn-outline-primary w-100 fw-bold fs-4 op-btn" data-op="*">× Multiply</button>
                        <div id="starsMul" class="star-container mt-2 text-warning"></div>
                    </div>
                    <div class="col-md-3">
                        <button id="opDiv" class="btn btn-outline-primary w-100 fw-bold fs-4 op-btn" data-op="/">÷ Divide</button>
                        <div id="starsDiv" class="star-container mt-2 text-warning"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="game-card text-center shadow">
                    
                    <h5 class="text-muted mb-0" id="roundInstructions">Select two primes to hit the target!</h5>
                    
                    <div class="equation-display" id="equationLayout">
                        <div class="input-box active" id="boxA">?</div>
                        <div class="op-symbol" id="symbolDisplay">+</div>
                        <div class="input-box" id="boxB">?</div>
                        <div class="op-symbol">=</div>
                        <div class="target-box" id="targetDisplay">0</div>
                    </div>

                    <div class="d-flex justify-content-center gap-3 mb-4">
                        <button id="btnClear" class="btn btn-secondary fw-bold px-4">Clear</button>
                        <button id="btnCheck" class="btn btn-success fw-bold px-4 fs-5 shadow">Check Answer</button>
                    </div>

                    <div id="feedbackAlert" class="alert fw-bold fs-4" style="display:none;"></div>

                    <hr>
                    <h5 class="text-secondary mb-3">Prime Number Bank:</h5>
                    <div id="primeBank" class="d-flex flex-wrap justify-content-center pb-3">
                        </div>

                    <div id="guessesArea" class="mt-3 text-start px-3"></div>
                    
                </div>
            </div>
        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    const MAX_STARS = 6;
    let stars = { '+': 0, '-': 0, '*': 0, '/': 0 };
    
    let currentDifficulty = null;
    let currentOp = '+';
    let primesBank = [];
    
    let targetNum = 0;
    let valA = null;
    let valB = null;
    let activeBox = 'A'; // Tracks which box the student is filling

    // --- 1. SETUP & UTILS ---
    function getPrimes(max) {
        let sieve = [], i, j, primes = [];
        for (i = 2; i <= max; ++i) {
            if (!sieve[i]) {
                primes.push(i);
                for (j = i << 1; j <= max; j += i) sieve[j] = true;
            }
        }
        return primes;
    }

    // Connect Difficulty Buttons
    $('#btnEasy').click(() => setDifficulty('easy', 20, $('#btnEasy')));
    $('#btnMedium').click(() => setDifficulty('medium', 50, $('#btnMedium')));
    $('#btnHard').click(() => setDifficulty('hard', 100, $('#btnHard')));

    function setDifficulty(level, maxPrime, btnElement) {
        currentDifficulty = level;
        primesBank = getPrimes(maxPrime);
        
        // UI Updates for Difficulty
        $('#btnEasy, #btnMedium, #btnHard').removeClass('active border-dark border-3 opacity-100').addClass('opacity-50');
        btnElement.removeClass('opacity-50').addClass('active border-dark border-3 opacity-100');
        
        buildPrimeBank();
        $('#gameSection').fadeIn();
        
        // Auto-start with addition
        if (!currentOp) setOperation('+');
        else setOperation(currentOp);
    }

    function buildPrimeBank() {
        $('#primeBank').empty();
        primesBank.forEach(p => {
            let btn = $('<button>', {
                class: 'btn btn-primary prime-btn shadow-sm',
                text: p
            });
            btn.click(() => fillActiveBox(p));
            $('#primeBank').append(btn);
        });
    }

    // --- 2. OPERATION LOGIC ---
    $('.op-btn').click(function() {
        if ($(this).prop('disabled')) return;
        setOperation($(this).data('op'));
    });

    function setOperation(op) {
        currentOp = op;
        
        // Highlight active operation button
        $('.op-btn').removeClass('btn-primary text-white').addClass('btn-outline-primary');
        $(`.op-btn[data-op="${op}"]`).removeClass('btn-outline-primary').addClass('btn-primary text-white');
        
        let symbol = (op === '*') ? '×' : (op === '/') ? '÷' : op;
        
        // Special Layout for Division (Target ÷ A = B)
        if (op === '/') {
            $('#equationLayout').html(`
                <div class="target-box" id="targetDisplay">0</div>
                <div class="op-symbol">÷</div>
                <div class="input-box active" id="boxA">?</div>
                <div class="op-symbol">=</div>
                <div class="input-box" id="boxB">?</div>
            `);
        } else {
            $('#equationLayout').html(`
                <div class="input-box active" id="boxA">?</div>
                <div class="op-symbol">${symbol}</div>
                <div class="input-box" id="boxB">?</div>
                <div class="op-symbol">=</div>
                <div class="target-box" id="targetDisplay">0</div>
            `);
        }

        // Rebind click events to the new boxes
        $('#boxA').click(() => setActiveBox('A'));
        $('#boxB').click(() => setActiveBox('B'));

        startRound();
    }

    // --- 3. GAME LOOP ---
    function startRound() {
        valA = null;
        valB = null;
        setActiveBox('A');
        $('#boxA, #boxB').text('?');
        $('#feedbackAlert').hide();
        $('#guessesArea').empty();
        
        // Generate valid targets using two random primes
        let p1 = primesBank[Math.floor(Math.random() * primesBank.length)];
        let p2 = primesBank[Math.floor(Math.random() * primesBank.length)];

        if (currentOp === '+') {
            targetNum = p1 + p2;
        } else if (currentOp === '-') {
            // Ensure no negative targets, and try not to equal 0
            if (p1 < p2) [p1, p2] = [p2, p1];
            if (p1 === p2 && p1 !== 2) p2 = 2; // Slight tweak to ensure p1-p2 > 0
            targetNum = p1 - p2;
        } else if (currentOp === '*' || currentOp === '/') {
            targetNum = p1 * p2; // For division, the target is the product!
        }

        $('#targetDisplay').text(targetNum);
    }

    function setActiveBox(box) {
        activeBox = box;
        $('#boxA, #boxB').removeClass('active');
        $('#box' + box).addClass('active');
    }

    function fillActiveBox(num) {
        if (activeBox === 'A') {
            valA = num;
            $('#boxA').text(num);
            setActiveBox('B'); // Auto-switch to second box
        } else {
            valB = num;
            $('#boxB').text(num);
            setActiveBox('A'); // Switch back
        }
    }

    $('#btnClear').click(() => {
        valA = null; valB = null;
        $('#boxA, #boxB').text('?');
        setActiveBox('A');
    });

    $('#btnCheck').click(() => {
        if (valA === null || valB === null) return;

        let isCorrect = false;
        let attemptString = '';

        if (currentOp === '+') {
            isCorrect = (valA + valB === targetNum);
            attemptString = `${valA} + ${valB} = ${valA + valB}`;
        } else if (currentOp === '-') {
            isCorrect = (valA - valB === targetNum);
            attemptString = `${valA} - ${valB} = ${valA - valB}`;
        } else if (currentOp === '*') {
            isCorrect = (valA * valB === targetNum);
            attemptString = `${valA} × ${valB} = ${valA * valB}`;
        } else if (currentOp === '/') {
            isCorrect = (targetNum / valA === valB);
            attemptString = `${targetNum} ÷ ${valA} = ${targetNum / valA || '?'}`;
        }

        if (isCorrect) {
            $('#feedbackAlert').removeClass('alert-danger alert-warning').addClass('alert-success').html('✅ Correct! Excellent prime matching.').fadeIn();
            
            stars[currentOp]++;
            updateStars();

            if (stars[currentOp] >= MAX_STARS) {
                setTimeout(() => lockOperation(currentOp), 1500);
            } else {
                setTimeout(startRound, 1500);
            }
        } else {
            $('#feedbackAlert').removeClass('alert-success alert-warning').addClass('alert-danger').html('❌ Incorrect. Check the math!').fadeIn();
            $('#guessesArea').prepend(`<div class="guess-log">❌ Tried: <strong>${attemptString}</strong></div>`);
            
            setTimeout(() => $('#feedbackAlert').fadeOut(), 2000);
        }
    });

    // --- 4. MASTERY TRACKING ---
    function updateStars() {
        $('#starsAdd').text('⭐'.repeat(stars['+']));
        $('#starsSub').text('⭐'.repeat(stars['-']));
        $('#starsMul').text('⭐'.repeat(stars['*']));
        $('#starsDiv').text('⭐'.repeat(stars['/']));
    }

    function lockOperation(op) {
        $(`.op-btn[data-op="${op}"]`).prop('disabled', true).removeClass('btn-primary btn-outline-primary').addClass('btn-secondary');
        $('#roundInstructions').html(`<span class="text-success fw-bold">Mastery Achieved!</span> Please select a different operation.`);
        
        // Wipe the board
        $('#boxA, #boxB').text('-');
        $('#targetDisplay').text('-');
        
        // Grand Victory Check
        if (stars['+'] >= MAX_STARS && stars['-'] >= MAX_STARS && stars['*'] >= MAX_STARS && stars['/'] >= MAX_STARS) {
            $('#roundInstructions').html(`<span class="text-success fw-bold fs-3">🏆 YOU BEAT THE WHOLE LEVEL! 🏆</span>`);
        }
    }
});
</script>

</body>
</html>
