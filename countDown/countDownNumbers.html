<script>
  function operateOnTwoNumbers(data2)
  {
// used to generate a solution - may not be unique
    ops = ["a","s",'m','d'] ;

  l = data2.length - 1 ;

if (l >= 2)  // more than two elements in data2
{
var p = 0 ;
var a = -1 ; 
var b = -1 ;
// get two data items
while (a == b)
{
  a = getRandomInt(0,l) ;
  b = getRandomInt(0,l) ;
}

// get values of the index
var x = data2[a] ;
var y = data2[b] ;

// console.log("got data2",data2,"removing for processing",x,y,"indexes",a,b) ;

// remove selected from the data2 array

data2.splice(data2.indexOf(x), 1);
data2.splice(data2.indexOf(y), 1);
// console.log("data2 after splice",data2) ;
}  // if l > 2
else 
{
  var x = data2[0] ;
  var y = data2[1] ;
//  console.log("got data length 2",data2," processing",x,y,"indexes") ;
  data2 = [] ; // empty array
}


// check of x is divisible by y or y divisible by x 
if (x > y) {var remainder = x % y ;}
if (y > x) {var remainder = y % x ;}
// console.log(x,y,remainder) ;
if (remainder == 0)
{z =  3  ;}  // if one is a multiple of the other
else 
{z = getRandomInt(0,2) ; }  // omit division as an option

op = ops[z] ;
// console.log("operating with ",op,x,y,data2) ;
$('#solution').append(x + " " + op + " " + y + "<br>") ;

switch(op) {
  case 'a':
     p = x + y ;
    break;

  case 's':
    if (x > y) {p = x- y; } else {p = y-x ;}
    break;

  case 'm':
    p = x * y;
    break;

  case 'd':
  if (x > y) {p = x /  y; } else {p = y / x ;}
    break;


}
data2.push(p) ;
// console.log("Coming back",p,data2); 
return data2 ;
  }

</script>

<script>
  function getRandomInt(lower,upper)
  {
    var randomNumber = Math.floor((Math.random() * upper) + lower) ; 
  return randomNumber + 1 ;
  }
</script>

<script>
  function makeTarget(source)
  {
  
   data = [];
  

// copy source to data

for (i = 0; i < source.length; i++) {
  data[i] = source[i];
}


var dataCopy  = [...data];
data = operateOnTwoNumbers(dataCopy) ;

var dataCopy  = [...data];
data = operateOnTwoNumbers(dataCopy) ;

var dataCopy  = [...data];
data = operateOnTwoNumbers(dataCopy) ;
// console.log("3 data is now",data) ;
// console.log("end",data) ;

var targetNumber = data[0] ;


  return targetNumber ;
  }
</script>

<script>

function startTimer(duration, display) {
    var timer = duration, minutes, seconds;
    setInterval(function () {
        minutes = parseInt(timer / 60, 10);
        seconds = parseInt(timer % 60, 10);

        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;

        display.text(minutes + ":" + seconds);

        if (--timer < 0) {
            display.text('X' + ":" + 'X');
            $('#gameArea').hide() ;
            $('#words').show() ;
          $('#answers').show() ;
            $('#newGame').show() ;
        }
    }, 1000);
}

</script>
