function colourKeys(word)

        }

}

    function getStatus(testWord,row)
    {
        // returns status of each myLetter
        // from row
        // right place right value
        // wrong place right value
        // not in word
        // as an array

        var status =[] ;
        word = testWord.split('');

        console.log("Arrays",word,secretArray);

            if (index == -1) 
                {
                    status[i] = 0;
                    $('#l' + row + i).css({"background-color":"black","color":"white"}).prop('disabled',true);
                    $('#myLetter'+ word[i]).css({"background-color":"black","color":"white"}).prop('disabled',true);
                }  // no match

            if (index != -1 & index != i) 
            {
                status[i] = 1 ;
                $('#l' + row + i).css({"background-color":"yellow","color":"green"});
                $('#myLetter'+ word[i]).css({"background-color":"yellow","color":"green"});

            } // match but wrong place
            if (index != -1 & index == i) 
                {
                    status[i] = 2;
                    $('#l' + row + i).css({"background-color":"green","color":"yellow"}).prop('disabled',true);
                    $('#myLetter'+ word[i]).css({"background-color":"green","color":"yellow"}).prop('disabled',true);

                    } // match and right place



        }
        return status;
    }
