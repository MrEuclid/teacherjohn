<script>

function startTimer(duration, display) {
    var timer = duration, minutes, seconds;
    setInterval(function () {
        minutes = parseInt(timer / 60, 10);
        seconds = parseInt(timer % 60, 10);

        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;

        display.text(minutes + ":" + seconds);

        if (--timer < 0) {
            display.text('X' + ":" + 'X');
            $('#gameArea').hide() ;

            $('#words').show() ;
          $('#answers').show() ;
            $('#newGame').show() ;
        }
    }, 1000);
}

</script>

<script>

    $(document).ready(function(){
       $('#check').on('click', function(){
  
        var  word = $('#guess').val() ;
       var   wordIndex = data.indexOf(word,0) ;
 // alert("INDEX = " + wordIndex) ;

 //   alert("checking " + word) ;

   //  console.log("DATA", word,data.indexOf(word)) ;

  
  if (wordIndex != -1 & word.length > 0 ) 
    {
       
      var dup = myWords.indexOf(word,0);
    
        if (dup == -1 ) 
            {
                myWords.push(word) ;
              //  alert('Yes - well done') ;
                var score = parseInt(word.length) ;
                var total = parseInt($('#total').html()) ;
                var sum = total + score ;

                var wordTotal = parseInt($('#nWords').html()) + 1;
                $('#nWords').text(wordTotal) ;

            //    console.log("Score",word,word.length,score,total,sum)
                $('#total').text(sum);
                $('#stars').append('*') ;
                // write myWords in order 
             
                myWords.sort() ;
                
                $('#words').empty() ;
                
                for (var i = 0 ; i < myWords.length; i++)
                {
                    $('#words').append(myWords[i] + ' - ');

               // $('#words').append(word + ' - ');
                teamName = person;
               writeData(teamName,word) ;
                alert("writing " + teamName + " " + word) ;

    }  // word index <> 0

    
   if (wordIndex == -1 & word.length > 0 ) {alert(word + ' is not in the dictionary'); }

    
    $('#guess').val('') ;
