<script type="text/javascript">
  

  function shuffleArray(data)

  {
     
// scramble the indexes of the slected sentences
 
    for (var i = data.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = data[i];
        data[i] = data[j];
        data[j] = temp;
    }
     
 b = data.slice(0) ;
  //   alert('Broken at end ' + data + ' a = ' + a + ' b = ' + b );
      return data;  // returns a random permutation of the indexes of the selected sentences -->
}

</script>
