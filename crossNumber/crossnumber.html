<script>

  function showNeighbours(place)

  // highlights squares which are neighbours to the last move
  // and are not occupied.

  {

    $("[id^=grd]").prop('disabled',true) ; // disable grid
    console.log(place) ;
    neighbourCount = 0 ;
    neighbours = [] ;
    var x = parseInt(place.substr(3,1));
    var y = parseInt(place.substr(4,1));
    console.log(place , x, y,row[x][y]);
    console.log(row);
    var ycoord = parseInt(y-1);
    if (row[x][ycoord] == 0)
    {
      $('#grd'+x+ycoord).css("background-color","yellow").prop('disabled',false);
      text1 = x.toString();
      text2 = ycoord.toString();
      neighbours.push(text1+text2);
      neighbourCount++;
    }

    var ycoord = parseInt(y+1);
    if (row[x][ycoord] == 0)
    {
      $('#grd'+x+ycoord).css("background-color","yellow").prop('disabled',false);
      text1 = x.toString();
      text2 = ycoord.toString();
      neighbours.push(text1+text2);
      neighbourCount++;
    }

    var xcoord = parseInt(x-1);
    if (row[xcoord][y] == 0)
    {
      $('#grd'+xcoord+y).css("background-color","yellow").prop('disabled',false);
      text1 = xcoord.toString();
      text2 = y.toString();
      neighbours.push(text1+text2);
      neighbourCount++;
    }

    var xcoord = parseInt(x+1);
    if (row[xcoord][y] == 0)
    {
      $('#grd'+xcoord+y).css("background-color","yellow").prop('disabled',false);
      text1 = xcoord.toString();
      text2 = y.toString();
      neighbours.push(text1+text2);
      neighbourCount++;
    }
console.log("neighbours",neighbours);
    return neighbourCount;

  }


</script>




<script>
  function newGame()
  {
 
    moves = [] ;

  // set places[x,y] = 0 
  // enable all squares

  for (var r = 0 ; r <= rows + 1; r++)
  {
    for (var c = 0 ; c <= columns + 1; c++)
    {
  
      // center
      if (r > 0 & r <= columns & c > 0 & c <= columns)
      {
        row[r][c] = 0 ;
        $('#grd'+r+c).css("background-color","grey").prop('disabled',false);
      }
      // borders 
      else
      {
      row[0][c] = 1;
      row[r][0] = 1 ; 
      }
  


 
  }
  }
