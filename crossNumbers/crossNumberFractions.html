<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rational Equations Cross-Number</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script type="text/x-mathjax-config">
        MathJax.Hub.Config({
            extensions: ["tex2jax.js"],
            jax: ["input/TeX","output/HTML-CSS"],
            tex2jax: {inlineMath: [["$","$"],["\\(","\\)"]]}
        });
    </script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js"></script>

    <style>
        body { background-color: #f8f9fa; }
        .puzzle-container {
            max-width: 950px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .grid-cell {
            width: 60px; height: 60px;
            position: relative;
            background-color: #212529; 
        }
        .grid-input {
            width: 100%; height: 100%;
            border: 1px solid #dee2e6;
            background-color: #e0f7fa;
            text-align: center;
            font-size: 1.5em; font-weight: bold;
            color: #000; outline: none;
            padding: 0; border-radius: 0;
        }
        .grid-input:focus {
            background-color: #fff9c4;
            border: 2px solid #0d6efd;
            z-index: 5;
        }
        .superscript {
            position: absolute; top: 2px; left: 4px;
            font-size: 0.7em; font-weight: bold; color: #495057;
            pointer-events: none; z-index: 10;
        }
        .clue-list { max-height: 550px; overflow-y: auto; padding-right: 15px; }
        .clue-list p {
            font-size: 1.1em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .variable-box {
            background-color: #e9ecef;
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
            font-weight: bold;
            font-size: 1.2em;
            color: #0d6efd;
        }
    </style>
</head>
<body class="py-5">

<div class="container">
    <div class="puzzle-container">
        
        <div class="text-center mb-4">
            <h1 class="display-5 text-primary fw-bold">Algebra Cross-Number</h1>
            <p class="lead text-secondary">Solving Equations</p>
            
            <div class="my-3">
                <div id="variable-display" class="variable-box shadow-sm">
                    </div>
            </div>

    

            <div class="alert alert-info d-inline-block">
                <strong>Instructions:</strong> Solve each equation for <strong>$n$</strong> to find the number for the grid.
            </div>
            
            <div id="success-msg" class="alert alert-success mt-3" style="display:none;">
                <strong>Correct!</strong> Well done. Generating new problems...
            </div>
        </div>

        <div class="row">
            <div class="col-lg-5 mb-4 d-flex justify-content-center">
                <div id="puzzle-grid" style="display: grid; grid-template-columns: repeat(5, 60px); gap: 2px; background: #212529; padding: 2px; border: 2px solid #212529;">
                    </div>
            </div>

            <div class="col-lg-7">
                <div class="row">
                    <div class="col-6">
                        <h4 class="text-primary border-bottom pb-2">Across</h4>
                        <div id="clues-across" class="clue-list"></div>
                    </div>
                    <div class="col-6">
                        <h4 class="text-primary border-bottom pb-2">Down</h4>
                        <div id="clues-down" class="clue-list"></div>
                    </div>
                </div>
                <div class="text-end mt-3">
                     <button id="skip-btn" class="btn btn-outline-secondary btn-sm">Skip / New Puzzle</button>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
let X_VAL, Y_VAL;

// --- RATIONAL EQUATION GENERATOR LOGIC ---

function generateRationalEquation(target) {
    const type = Math.floor(Math.random() * 5); 
    let eqStr = "";
    let C;

    // Type 0: Simple Denominator
    // C / n = x   =>   C = target * x
    if (type === 0) {
        C = target * X_VAL;
        eqStr = `\\frac{${C}}{n} = x`;
    } 

    // Type 1: Binomial Denominator (Addition)
    // C / (n + x) = y   =>   C = (target + x) * y
    else if (type === 1) {
        C = (target + X_VAL) * Y_VAL;
        eqStr = `\\frac{${C}}{n + x} = y`;
    } 

    // Type 2: Binomial Denominator (Subtraction)
    // C / (n - x) = y   =>   C = (target - x) * y
    else if (type === 2) {
        C = (target - X_VAL) * Y_VAL;
        
        // Prevent trivial 0/0 scenarios if the random target equals X_VAL
        if (C === 0) {
            C = (target + X_VAL) * Y_VAL;
            eqStr = `\\frac{${C}}{n + x} = y`;
        } else {
            eqStr = `\\frac{${C}}{n - x} = y`;
        }
    } 

    // Type 3: Denominator with Coefficient
    // C / (An + x) = y   =>   C = (A*target + x) * y
    else if (type === 3) {
        let A = Math.floor(Math.random() * 4) + 2; // Random coefficient 2 to 5
        C = (A * target + X_VAL) * Y_VAL;
        eqStr = `\\frac{${C}}{${A}n + x} = y`;
    } 

    // Type 4: Fraction plus a constant
    // C / n + A = x   =>   C/n = x - A   =>   C = target * (x - A)
    else if (type === 4) {
        let A = Math.floor(Math.random() * 10) + 1;
        // Ensure C doesn't evaluate to 0
        if (A === X_VAL) A++; 
        
        C = target * (X_VAL - A);
        let op = A >= 0 ? '+' : '-';
        eqStr = `\\frac{${C}}{n} ${op} ${Math.abs(A)} = x`;
    }

    return `$ ${eqStr} $`;
}

// --- SHORTER GRID TEMPLATES (Ensures max 3-digit targets) ---
const gridTemplates = [
    [
        ['B','W','W','W','B'],
        ['W','W','B','W','W'],
        ['W','B','W','B','W'],
        ['W','W','B','W','W'],
        ['B','W','W','W','B']
    ],
    [
        ['W','W','B','W','W'],
        ['W','B','W','W','B'],
        ['W','W','W','B','W'],
        ['B','W','W','B','W'],
        ['W','W','B','W','W']
    ],
    [
        ['W','W','B','W','W'],
        ['W','W','B','W','W'],
        ['B','B','W','B','B'],
        ['W','W','B','W','W'],
        ['W','W','B','W','W']
    ],
    [
        ['B','W','W','B','W'],
        ['W','W','B','W','W'],
        ['W','B','W','W','B'],
        ['W','W','B','W','W'],
        ['B','W','W','B','W']
    ]
];

function generateNewPuzzle() {
    $('#success-msg').hide();
    
    // Randomize Variables for this round (Kept between 2 and 12 to ensure clean arithmetic)
    X_VAL = Math.floor(Math.random() * 11) + 2; 
    Y_VAL = Math.floor(Math.random() * 11) + 2; 
    if(X_VAL === Y_VAL) Y_VAL++; 

    $('#variable-display').html(`x = ${X_VAL} &nbsp;&nbsp;|&nbsp;&nbsp; y = ${Y_VAL}`);

    // Pick Grid & Fill Answers randomly
    let layout = gridTemplates[Math.floor(Math.random() * gridTemplates.length)];
    let gridAnswers = [];
    $('#puzzle-grid').empty();

    for (let r = 0; r < 5; r++) {
        gridAnswers[r] = [];
        for (let c = 0; c < 5; c++) {
            if (layout[r][c] === 'W') {
                gridAnswers[r][c] = Math.floor(Math.random() * 9) + 1; 
            } else {
                gridAnswers[r][c] = null;
            }
        }
    }

    let targetsAcross = [];
    let targetsDown = [];
    let clueNum = 1;

    for (let r = 0; r < 5; r++) {
        for (let c = 0; c < 5; c++) {
            if (gridAnswers[r][c] !== null) {
                let isAcrossStart = (c === 0 || gridAnswers[r][c-1] === null) && (c < 4 && gridAnswers[r][c+1] !== null);
                let isDownStart = (r === 0 || gridAnswers[r-1][c] === null) && (r < 4 && gridAnswers[r+1][c] !== null);
                
                let numbered = false;
                if (isAcrossStart) {
                    numbered = true;
                    let numStr = "";
                    let col = c;
                    while(col < 5 && gridAnswers[r][col] !== null) { numStr += gridAnswers[r][col]; col++; }
                    targetsAcross.push({ id: clueNum, target: parseInt(numStr) });
                }
                if (isDownStart) {
                    numbered = true;
                    let numStr = "";
                    let row = r;
                    while(row < 5 && gridAnswers[row][c] !== null) { numStr += gridAnswers[row][c]; row++; }
                    targetsDown.push({ id: clueNum, target: parseInt(numStr) });
                }

                let label = numbered ? `<div class="superscript">${clueNum}</div>` : '';
                $('#puzzle-grid').append(`
                    <div class="grid-cell">
                        ${label}
                        <input type="text" class="grid-input" maxlength="1" data-answer="${gridAnswers[r][c]}" />
                    </div>
                `);
                if (numbered) clueNum++;
            } else {
                $('#puzzle-grid').append(`<div class="grid-cell"></div>`);
            }
        }
    }

    $('#clues-across, #clues-down').empty();
    targetsAcross.forEach(item => {
        $('#clues-across').append(`<p><strong>${item.id}.</strong> ${generateRationalEquation(item.target)}</p>`);
    });
    targetsDown.forEach(item => {
        $('#clues-down').append(`<p><strong>${item.id}.</strong> ${generateRationalEquation(item.target)}</p>`);
    });

    MathJax.Hub.Queue(["Typeset", MathJax.Hub]);
    $('.grid-input').on('input keyup', checkWinCondition);
}

function checkWinCondition() {
    let allFilled = true;
    let allCorrect = true;
    $('.grid-input').each(function() {
        let expected = $(this).attr('data-answer');
        let val = $(this).val();
        if (val === "") { allFilled = false; $(this).css('background-color', '#e0f7fa'); }
        else if (val !== expected) { allCorrect = false; $(this).css('background-color', '#ffcdd2'); }
        else { $(this).css('background-color', '#c8e6c9'); }
    });
    if (allFilled && allCorrect) {
        $('#success-msg').fadeIn();
        setTimeout(() => { generateNewPuzzle(); }, 3000);
    }
}

$(document).ready(function() {
    generateNewPuzzle(); 
    $('#skip-btn').click(generateNewPuzzle);
});
</script>
</body>
</html>
