<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Advanced Rational Equations Quiz</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script type="text/x-mathjax-config">
        MathJax.Hub.Config({
            extensions: ["tex2jax.js"],
            jax: ["input/TeX","output/HTML-CSS"],
            tex2jax: {inlineMath: [["$","$"],["\\(","\\)"]]}
        });
    </script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js"></script>

    <style>
        body { background-color: #f8f9fa; }
        .quiz-container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .quiz-input {
            width: 100px;
            height: 60px;
            border: 2px solid #dee2e6;
            background-color: #e0f7fa;
            text-align: center;
            font-size: 1.8em; 
            font-weight: bold;
            color: #000; 
            outline: none;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }
        .quiz-input:focus {
            background-color: #fff9c4;
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13,110,253,.25);
        }
        .question-row {
            transition: all 0.2s ease;
        }
        .question-row:hover {
            background-color: #f8f9fa !important;
        }
        .variable-box {
            background-color: #e9ecef;
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
            font-weight: bold;
            font-size: 1.2em;
            color: #0d6efd;
        }
        #star-display {
            font-size: 2.5rem;
            color: #ffc107; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            min-height: 50px; 
        }
        #success-msg {
            display: none;
        }
    </style>
</head>
<body class="py-5">

<div class="container">
    <div class="quiz-container">
        
        <div class="text-center mb-4">
            <h1 class="display-5 text-primary fw-bold">Algebra Practice</h1>
            <p class="lead text-secondary">Advanced Rational Equations</p>
            
            <div class="my-3">
                <div id="variable-display" class="variable-box shadow-sm">
                    </div>
            </div>

            <div id="star-display" class="mb-2"></div>

            <div class="alert alert-info d-inline-block">
                <strong>Instructions:</strong> Solve each rational equation for <strong>$n$</strong>. Check for extraneous solutions!
            </div>
            <br>
            <div id="success-msg" class="alert alert-success shadow-sm mx-auto mt-2" style="max-width: 400px; display: none;">
                <strong>Correct!</strong> Perfect score. Generating a new set...
            </div>
        </div>

        <div id="question-list" class="mt-4">
            </div>

        <div class="text-end mt-4">
             <button id="skip-btn" class="btn btn-outline-secondary btn-lg shadow-sm">Skip / Generate New Set</button>
        </div>

    </div>
</div>

<script>
let X_VAL, Y_VAL;
let totalWins = 0;
let quizActive = true;
const QUESTIONS_PER_ROUND = 6;

// --- ADVANCED RATIONAL EQUATION GENERATOR ---

function generateAdvancedRational(target) {
    const type = Math.floor(Math.random() * 4); 
    let eqStr = "";
    let C;

    if (type === 0) {
        let A = Math.floor(Math.random() * 6) + 1;
        if (A === X_VAL) A++; 
        
        let k = Math.floor(Math.random() * 3) + 1;
        let B = k * (target + X_VAL);
        C = (k - Y_VAL) * (target + A);
        
        eqStr = `\\frac{${B}}{n + x} - y = \\frac{${C}}{n + ${A}}`;
    } 
    else if (type === 1) {
        let A = Math.floor(Math.random() * 6) + 1;
        if (A === X_VAL) A++; 
        
        let k = Math.floor(Math.random() * 4) + 2; 
        let B = k * (target + X_VAL);
        C = k * (target + A);
        
        eqStr = `\\frac{${B}}{n + x} = \\frac{${C}}{n + ${A}}`;
    } 
    else if (type === 2) {
        let k1 = Math.floor(Math.random() * (Y_VAL - 1)) + 1; 
        let k2 = Y_VAL - k1;
        
        let B = k1 * (target + X_VAL);
        C = k2 * target;
        
        eqStr = `\\frac{${B}}{n + x} + \\frac{${C}}{n} = y`;
    } 
    else if (type === 3) {
        let A = Math.floor(Math.random() * 6) + 1;
        if (A === X_VAL) A++;
        
        let N1 = Math.floor(Math.random() * 5) + 3;
        let N2 = Math.floor(Math.random() * 5) + 3;
        if (N1 === N2) N2++; 
        
        C = (N1 * (target + A)) - (N2 * (target + X_VAL));
        let op = C >= 0 ? '' : '-';
        
        eqStr = `\\frac{${N1}}{n + x} - \\frac{${N2}}{n + ${A}} = \\frac{${C}}{(n + x)(n + ${A})}`;
    }

    return `$ ${eqStr} $`;
}

// --- MAIN LOOP ---

function generateNewQuiz() {
    quizActive = true;
    $('#success-msg').hide();
    $('#question-list').empty();

    // Randomize Variables for this round (between 4 and 10 to ensure clean arithmetic)
    X_VAL = Math.floor(Math.random() * 7) + 4; 
    Y_VAL = Math.floor(Math.random() * 7) + 4; 
    if(X_VAL === Y_VAL) Y_VAL++; 

    $('#variable-display').html(`x = ${X_VAL} &nbsp;&nbsp;|&nbsp;&nbsp; y = ${Y_VAL}`);

    for (let i = 1; i <= QUESTIONS_PER_ROUND; i++) {
        // Target answer between 1 and 15
        let target = Math.floor(Math.random() * 15) + 1; 
        let clue = generateAdvancedRational(target);

        // Build the horizontal row for each question
        let rowHtml = `
            <div class="d-flex align-items-center mb-3 p-3 border rounded shadow-sm bg-white question-row">
                <div class="me-4 fw-bold fs-4 text-primary">${i}.</div>
                <div class="flex-grow-1 fs-4">${clue}</div>
                <div>
                    <input type="text" class="quiz-input form-control" data-answer="${target}" />
                </div>
            </div>
        `;
        $('#question-list').append(rowHtml);
    }

    // Render MathJax and attach listeners
    MathJax.Hub.Queue(["Typeset", MathJax.Hub]);
    $('.quiz-input').on('input keyup', checkWinCondition);
}

// --- VALIDATION LOGIC ---

function checkWinCondition() {
    if (!quizActive) return;

    let allFilled = true;
    let allCorrect = true;

    $('.quiz-input').each(function() {
        let expected = $(this).attr('data-answer');
        let val = $(this).val().trim(); 

        if (val === "") { 
            allFilled = false; 
            $(this).css('background-color', '#e0f7fa'); 
        } 
        else if (parseInt(val) !== parseInt(expected)) { 
            allCorrect = false; 
            $(this).css('background-color', '#ffcdd2'); 
        } 
        else { 
            $(this).css('background-color', '#c8e6c9'); 
        }
    });
    
    // Win Condition Met
    if (allFilled && allCorrect) {
        quizActive = false; // Lock game to stop multiple triggers
        
        // Add a Star
        totalWins++;
        $('#star-display').text('⭐'.repeat(totalWins)); 

        $('#success-msg').fadeIn();
        
        // Wait 3 seconds, fade out success msg, generate next quiz
        setTimeout(() => {
            $('#success-msg').fadeOut(400, function() {
                generateNewQuiz();
            });
        }, 3000);
    }
}

// --- INITIALIZATION ---
$(document).ready(function() {
    generateNewQuiz(); 
    $('#skip-btn').click(generateNewQuiz);
});
</script>
</body>
</html>
