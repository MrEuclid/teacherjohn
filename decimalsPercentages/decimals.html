<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Decimals, Fractions & Percentages</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script type="text/x-mathjax-config">
        MathJax.Hub.Config({
            extensions: ["tex2jax.js"],
            jax: ["input/TeX","output/HTML-CSS"],
            tex2jax: {inlineMath: [["$","$"],["\\(","\\)"]]}
        });
    </script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML"></script>

    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        .header-section { margin-top: 20px; margin-bottom: 30px; }
        
        /* Modern Cards */
        .game-card {
            background: white;
            border-radius: 15px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        /* Star tracking */
        .star-container { 
            font-size: 1.1rem; 
            letter-spacing: 2px; 
            height: 25px; 
        }

        /* MathJax scaling so it's readable for kids */
        .mathjax-lg .MathJax { font-size: 3rem !important; }
        .mathjax-md .MathJax { font-size: 1.8rem !important; }

        /* The Answer Option Buttons */
        .option-btn {
            border-radius: 15px;
            min-width: 150px;
            min-height: 90px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .option-btn:hover:not(:disabled) {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        
        /* Disabled state styling for wrong answers */
        .btn-danger:disabled {
            opacity: 0.6;
            transform: none !important;
        }
    </style>
</head>

<body>

<div class="p-3">
    <a href="/index.php" class="btn btn-outline-secondary fw-bold shadow-sm">
        ← Back to home
    </a>
</div>

<div class="container pb-5">
    <div class="header-section text-center">
        <h1 class="display-5 fw-bold text-primary">Calculate</h1>
        <p class="text-muted fs-5">Master decimals, fractions, and percentages!</p>
    </div>

    <div class="row justify-content-center mb-4">
        <div class="col-lg-10">
            <h4 class="text-secondary text-center mb-3" id="menuInstructions">Select a challenge to begin:</h4>
            
            <div class="row g-3 justify-content-center" id="modeButtons">
                </div>
        </div>
    </div>

    <div id="gameArea" style="display:none;" class="row justify-content-center text-center mt-4">
        <div class="col-md-9">
            <div class="game-card shadow p-4 border-0">
                <h3 class="text-secondary mb-2" id="questionPrompt">Convert this value:</h3>
                
                <div id="questionDisplay" class="mathjax-lg display-1 fw-bold text-primary my-4">?</div>
                
                <hr>
                <h5 class="text-muted mb-4">Choose the correct match:</h5>
                
                <div id="optionsArea" class="d-flex flex-wrap justify-content-center gap-3 mathjax-md">
                    </div>
                
                <div id="feedbackAlert" class="alert mt-4 fw-bold fs-4" style="display:none;"></div>
            </div>
        </div>
    </div>

</div>

<script>
$(document).ready(function() {
    const MAX_STARS = 10;
    
    // The 6 conversion game modes
    const types = [
        { id: 'dec2perc', label: 'Decimal → Percentage', from: 'decimal', to: 'percent', btnClass: 'btn-primary' },
        { id: 'dec2frac', label: 'Decimal → Fraction', from: 'decimal', to: 'fraction', btnClass: 'btn-info text-dark' },
        { id: 'perc2dec', label: 'Percentage → Decimal', from: 'percent', to: 'decimal', btnClass: 'btn-success' },
        { id: 'perc2frac', label: 'Percentage → Fraction', from: 'percent', to: 'fraction', btnClass: 'btn-warning text-dark' },
        { id: 'frac2dec', label: 'Fraction → Decimal', from: 'fraction', to: 'decimal', btnClass: 'btn-danger' },
        { id: 'frac2perc', label: 'Fraction → Percentage', from: 'fraction', to: 'percent', btnClass: 'btn-secondary' }
    ];
    
    let stars = {};
    let currentMode = null;
    let currentCorrectValue = null;
    let attemptsThisRound = 0; // Tracks guesses per question

    // --- 1. INITIALIZE THE MENU UI ---
    types.forEach(t => {
        stars[t.id] = 0;
        
        let html = `
            <div class="col-lg-4 col-md-6">
                <div class="game-card p-3 shadow-sm h-100 border-0 text-center">
                    <button id="btn-${t.id}" class="btn ${t.btnClass} w-100 fw-bold py-3 fs-5">${t.label}</button>
                    <div id="stars-${t.id}" class="star-container mt-2 text-warning"></div>
                </div>
            </div>
        `;
        $('#modeButtons').append(html);
        
        $(`#btn-${t.id}`).click(() => startGame(t));
    });

    // --- 2. MATH LOGIC & PROGRESSIVE DIFFICULTY ---
    function gcd(a, b) { 
        return b ? gcd(b, a % b) : Math.abs(a); 
    }
    
    function generateQuestion() {
        let currentStars = currentMode ? stars[currentMode.id] : 0;
        let denOptions = [];
        
        if (currentStars < 3) {
            denOptions = [2, 4, 5, 10]; 
        } else if (currentStars < 7) {
            denOptions = [2, 4, 5, 8, 10, 20, 25]; 
        } else {
            denOptions = [8, 16, 20, 25, 40, 50, 100]; 
        }
        
        let den = denOptions[Math.floor(Math.random() * denOptions.length)];
        let num = Math.floor(Math.random() * (den - 1)) + 1;
        while (gcd(num, den) !== 1) {
            num = Math.floor(Math.random() * (den - 1)) + 1;
        }
        
        let dec = num / den;
        let perc = dec * 100;
        
        return {
            fraction: `$\\frac{${num}}{${den}}$`,
            decimal: Number(dec.toFixed(4)).toString(),
            percent: Number(perc.toFixed(2)).toString() + "%",
            value: dec 
        };
    }

    // --- 3. UI UPDATES ---
    function renderStars() {
        types.forEach(t => {
            let s = stars[t.id];
            $(`#stars-${t.id}`).text('⭐'.repeat(s));
            
            if (s >= MAX_STARS) {
                $(`#btn-${t.id}`).prop('disabled', true).removeClass(t.btnClass).addClass('btn-outline-secondary');
            }
        });
        
        if (Object.values(stars).every(s => s >= MAX_STARS)) {
            $('#menuInstructions').html('<span class="text-success fw-bold fs-3">🏆 AMAZING! YOU MASTERED EVERY CONVERSION! 🏆</span>');
            $('#gameArea').hide();
        }
    }

    // --- 4. GAME PLAY LOOP ---
    function startGame(modeInfo) {
        if (stars[modeInfo.id] >= MAX_STARS) return; 
        
        currentMode = modeInfo;
        $('#gameArea').fadeIn();
        $('html, body').animate({ scrollTop: $("#gameArea").offset().top - 50 }, 500);
        
        loadRound();
    }

    function loadRound() {
        if (!currentMode) return;
        
        attemptsThisRound = 0; // Reset attempts for the new question
        $('#feedbackAlert').hide();
        $('#optionsArea').empty();
        
        let targetQuestion = generateQuestion();
        currentCorrectValue = targetQuestion.value;
        
        $('#questionDisplay').html(targetQuestion[currentMode.from]);
        MathJax.Hub.Queue(["Typeset", MathJax.Hub, "questionDisplay"]);
        
        let options = [targetQuestion];
        while(options.length < 4) {
            let fakeOpt = generateQuestion();
            if (!options.find(o => o.value === fakeOpt.value)) {
                options.push(fakeOpt);
            }
        }
        
        options.sort(() => Math.random() - 0.5);
        
        options.forEach(opt => {
            let btn = $('<button>', {
                class: 'btn btn-outline-primary m-2 option-btn fs-2 fw-bold bg-white',
                html: opt[currentMode.to]
            });
            
            btn.click(() => checkAnswer(opt.value, btn));
            $('#optionsArea').append(btn);
        });
        
        MathJax.Hub.Queue(["Typeset", MathJax.Hub, "optionsArea"]);
    }

    function checkAnswer(selectedValue, btnElement) {
        // Prevent clicking while the animation/timeout is running
        $('.option-btn').prop('disabled', true);
        
        if (selectedValue === currentCorrectValue) {
            // CORRECT
            btnElement.removeClass('btn-outline-primary bg-white').addClass('btn-success text-white');
            $('#feedbackAlert').removeClass('alert-danger alert-warning').addClass('alert-success').html('✅ Brilliant!').fadeIn();
            
            stars[currentMode.id]++;
            renderStars();
            
            if (stars[currentMode.id] >= MAX_STARS) {
                setTimeout(() => {
                    $('#gameArea').slideUp();
                    $('#menuInstructions').html(`<span class="text-success fw-bold">Mastered ${currentMode.label}! Pick another challenge.</span>`);
                    $('html, body').animate({ scrollTop: 0 }, 500);
                }, 1500);
            } else {
                setTimeout(loadRound, 1500);
            }
            
        } else {
            // INCORRECT
            attemptsThisRound++;
            
            // Turn the specific wrong button red permanently for this round
            btnElement.removeClass('btn-outline-primary bg-white').addClass('btn-danger text-white');
            
            if (attemptsThisRound >= 2) {
                // Out of chances
                $('#feedbackAlert').removeClass('alert-success alert-warning').addClass('alert-danger').html('❌ Out of chances! Loading new question...').fadeIn();
                setTimeout(loadRound, 1500); // Generate new question
            } else {
                // 1 chance left
                $('#feedbackAlert').removeClass('alert-success alert-danger').addClass('alert-warning text-dark').html('⚠️ Incorrect. You have 1 chance left!').fadeIn();
                
                // Re-enable the remaining options after a brief pause so they can try again
                setTimeout(() => {
                    $('.option-btn').not('.btn-danger').prop('disabled', false); 
                    $('#feedbackAlert').fadeOut();
                }, 1200);
            }
        }
    }
    
    renderStars(); 
});
</script>

</body>
</html>
