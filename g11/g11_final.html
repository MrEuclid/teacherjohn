<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Quiz - Contestant</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 2rem auto; line-height: 1.6; text-align: center;}
        .question-card { background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        .options { list-style-type: none; padding-left: 0; display: flex; flex-direction: column; gap: 10px; }
        .options button { padding: 15px; font-size: 16px; cursor: pointer; }
        #waiting-screen { color: #555; font-style: italic; margin-top: 50px; }
    </style>

    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }, startup: { typeset: false } };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <h1>Live Math Competition</h1>
    
    <div id="quiz-container">
        <h2 id="waiting-screen">Waiting for Quizmaster to release the next question...</h2>
    </div>

    <script>
        // 3. Paste YOUR Firebase Config here
         const firebaseConfig = {
    apiKey: "AIzaSyD8c_2XHR5TOD2MnOUFqp5lA73YZd-qcd0",
    authDomain: "maths-comp.firebaseapp.com",
    databaseURL: "https://maths-comp-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "maths-comp",
    storageBucket: "maths-comp.firebasestorage.app",
    messagingSenderId: "1039547262286",
    appId: "1:1039547262286:web:b395094c0847455213ea1f"
  };
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const container = document.getElementById('quiz-container');
        let allQuestions = [];
        let timeReleased = 0;
        let studentName = prompt("Enter your name to join:") || "Anonymous Student";

        // 4. Pre-load the JSON data (so it's ready when the Quizmaster clicks release)
        fetch('askAudienceQuestions.json')
            .then(res => res.json())
            .then(data => {
                const table = data.find(item => item.type === "table" && item.name === "askAudienceQuestions");
                allQuestions = table ? table.data : [];
            });

        // 5. THE MAGIC: Listen to the Realtime Database!
        // We tell Firebase to listen to a node called 'currentRound'
        db.ref('currentRound').on('value', (snapshot) => {
            const currentRoundData = snapshot.val();
            
            // If the Quizmaster hasn't set a round yet, do nothing
            if (!currentRoundData) return;

            if (currentRoundData.status === "released") {
                // The Quizmaster clicked Release! Show the question.
                const questionIndex = currentRoundData.questionNumber - 1; // Array is 0-indexed
                const q = allQuestions[questionIndex];
                
                timeReleased = Date.now(); // Start the timer!

                container.innerHTML = `
                    <div class="question-card">
                        <h3>Question ${currentRoundData.questionNumber}</h3>
                        <p>${q.question}</p>
                        <div class="options">
                            <button onclick="submitAnswer('A')">A: ${q.optionA}</button>
                            <button onclick="submitAnswer('B')">B: ${q.optionB}</button>
                            <button onclick="submitAnswer('C')">C: ${q.optionC}</button>
                            <button onclick="submitAnswer('D')">D: ${q.optionD}</button>
                            <button onclick="submitAnswer('E')">E: ${q.optionE}</button>
                        </div>
                    </div>
                `;

                // Render MathJax
                if (window.MathJax && window.MathJax.typesetPromise) {
                    MathJax.typesetPromise([container]);
                }
            } 
            else if (currentRoundData.status === "waiting") {
                // The Quizmaster terminated the round
                container.innerHTML = `<h2 id="waiting-screen">Round over! Waiting for next question...</h2>`;
            }
        });

        // 6. Submitting the answer back to Firebase
        window.submitAnswer = function(answerLetter) {
            const timeTaken = (Date.now() - timeReleased) / 1000; // in seconds
            
            // Push the result to a 'responses' folder in the database
            db.ref('responses').push({
                student: studentName,
                answer: answerLetter,
                time: timeTaken
            });

            container.innerHTML = `<h2>Answer Submitted! Time: ${timeTaken}s. Waiting for others...</h2>`;
        };
    </script>
</body>
</html>
