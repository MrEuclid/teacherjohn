<script>

    })

   
})

<script>

  function initialise(wordCnt,total)
  {
    clicks = 0 ;
    hits = 0 ;
    $('#score').text(hits) ;
    $('#clickCount').text(clicks) ;
   $('[id^=letter]').text('?');
    current = '' ; // current focus id
    currentRow = ''; // current row id
    rowNumber = 0 ; // each row has the players attempt at finding the word
    // wordLength = 5 ; // sets the number of letters in the word ( 4 or 5)
    maxRows = 5 ;
    columnNumber = 0 ; // first letter
    keys = []; // status of gridetters on the keyboard
    grid = []; // row, column, value and status of the letters making up each word
    secretWord = '' ;
    secretArray = [] ;
    $('#theWord').hide() ;
 
    $('#score').text(total) ;
    $('#wordCount').text(wordCnt)

    $('.words').text("\u2060")
    $('.words').css({"background-color":"blue","color":"yellow"}) ;

    $('#check').prop('disabled',true);


    nextLetter = 'grid' + rowNumber + columnNumber ;
   $('#' + nextLetter).focus() ; // move focus to first letter in first row
   $('#' + nextLetter).css({"background-color":"orange"});
   $('.square').css({"background-color":"blue","color":"yellow"});
    $('.square').show() ;

// ;oad dictionary all  words
allWords = [] ;
  $.ajax({
  url: 'loadSecretWordsAll.php',
  type: 'POST',
  data: {wordLength:wordLength},
  datatype: 'json'
})  // parameters
.done(function (response) { 

// console.log("response",response.length,response) ;
 allWords = JSON.parse(response) ;


})  //doneWords

// load dictionary G1 - G6 words - to get the secret word  

  $.ajax({
  url: 'loadLetsGoWords.php',
  type: 'POST',
  data: {wordLength:wordLength},
  datatype: 'json'
})  // parameters
.done(function (data) { 

 console.log("data ",data) ;
 secretWord = data ;
 // alert("The answer was " + secretWord);

   secretArray = Array.from(secretWord);
 //   secretWord.split('');  // secret word as an array

   if (secretArray.length > wordLength)
   {
    secretArray.shift() ;
    secretArray.shift() ;  // gets rid of /r /n
    }
console.log(secretArray) ;
  
  
    $('#theWord').text(secretWord);

    for (var i = 0 ; i < data.length; i++)
    {
        $('#showWords').append(data[i] + ' ') ;
    }



})  //done
.fail(function (jqXHR, textStatus, errorThrown) { 
alert("Failure " + jqXHR + ' ' + textStatus + ' error ' + errorThrown) ;

})  // fail
    
 


    }

</script>
