  <script type="text/javascript">
    $(document).ready(function(){
        $('[id^=l]').on("click", function(event) {

    var t = this.id ;
    level = parseInt(t.substring(1,3)) ;
    clicks = 0 ; 
 
// level -= 1  hide 25,50,75
if (level == 1)
{
$('[id$=25]').hide() ;
$('[id$=50]').hide() ;
$('[id$=75]').hide() ;
}
// level = 2 hide 25,75

if (level == 2)
{
$('[id$=25]').hide() ;
$('[id$=75]').hide() ;
}
// level = 3 show all
   
 
    $('#playingLevel').text(level) ;
    $('#gameLevels').hide() ;
    $('#main').show() ;
    $('#scoreButtons').show() ;

    // M = model 
    x = Math.floor((Math.random()*(level+1))); // number in {0,2}
    y = Math.floor((Math.random()*(level+1))); // number in {0,2}
    z = Math.floor((Math.random()*(level+1))); // number in {0,2}

    rM = x*100/level;
     gM = y*100/level;
     bM=  z*100/level;

     if (rM < 0 ) {rM = 0 ;}
     if (gM < 0 ) {gM = 0 ;}
     if (bM < 0 ) {bM = 0 ;}

     // P palette

     rP = 0 ;
     gP = 0 ;
     bP = 0 ;

     colorM = "rgb(" + rM + "%,"  + gM + "%," + bM + "%)";
     colorP = "rgb(" + rP + "%,"  + gP + "%," + bP + "%)";

     $('#model').css({'background-color': colorM }) ;
     $('#palette').css({'background-color': colorP }) ;   




     $('#answer').text(colorM);
     
     $('#palette').text('Check') ;  
         })
       })
   </script>

<script type="text/javascript">
  $(document).ready(function(){
      $('[id^=btn]').on("click", function(event) {

        colorP = "rgb(" + rP + "%,"  + gP + "%," + bP + "%)";
        

        var t = this.id ;

        if (t != 'btnRed' | t != 'btnGreen' | t != 'btnBlue')
        {$('[id^=btn]').prop('disabled',false);}

        $('#btnRed').prop('disabled',true);   
  $('#btnGreen').prop('disabled',true); 
  $('#btnBlue').prop('disabled',true); 
        var bid = this.id ;
        $('#'+bid).prop('disabled',true);

        var cid = bid.substr(3,1) ;
        if (cid == 'R')
        {
          rP = bid.substr(6,3);
      var cR = 'rgb(' + rP + '%,0%,0%)';
      $('#btnRed').css({'background-color':cR});
      $('#btnRed').text(rP + '%');
 
         // alert(bid + ' ' + cid + ' ' + rP) ;
        }

        if (cid == 'G')
        {
          gP = bid.substr(8,3);
          var cG  = 'rgb(0%,' + gP + '%,0%)';
          $('#btnGreen').css({'background-color':cG}) ;
          $('#btnGreen').text(gP + '%');
         // alert(bid + ' ' + cid + ' ' + gP) ;
        }

        if (cid == 'B')
        {
          bP = bid.substr(7,3);
          cB = 'rgb(0%,0%,' + bP + '%)';
          $('#btnBlue').css({'background-color':cB});
          $('#btnBlue').text(bP + '%');
         // alert(bid + ' ' + cid + ' ' + bP) ;
        }



     

        colorP = "rgb(" + rP + "%,"  + gP + "%," + bP + "%)";
        
        $('#palette').css({'background-color': colorP }) ; 

        clicks++ ;
        $('#score').text(clicks);


      })
    })

</script>
