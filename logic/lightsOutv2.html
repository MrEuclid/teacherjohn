{

bID = parseInt(bID) ;
var fullID = 'light-' + bID ;



var bClass = $('#' + fullID).attr("class") ;

// alert('switching ' + fullID + ' class = ' + bClass + ' (x,y) ' + bX + ' ' + bY) ;
if (bClass == 'off')
  {$('#' + fullID).removeClass("off");
  $('#' + fullID).addClass("on"); 
// alert('Switched ' + fullID + 'on');
}

if (bClass == 'on')
  {$('#' + fullID).removeClass("on");

// alert('Switched ' + fullID + 'off') ;
}


  }

<script type="text/javascript">
  
   $(document).on("click", '[id^=light]', function(event) {

// when id is changed after dom load binding must occur after document load for click to work
var myID = this.id ; 

 // alert(myID) ;     
// toggle class
var myClass = $(this).attr("class");

// $('[id^=light]').attr("disabled",true) ;
 $('[id^=light]').prop('disabled', true);
 setTimeout(function() {
       $('[id^=light]').prop('disabled', false);
 }, 2000);




// alert("Class = " + myClass + "ID = " + myID + 'Max = ' + max);
 //  alert(cells) ;
//$('[id^=light]').attr("disabled",false) ;

completed = false ;

if (myClass == 'off')
  {
 
    $(this).removeClass("off");
    $(this).addClass("on") ;
}

if (myClass == 'on')
  {
 
    $(this).removeClass("on");
  $(this).addClass("off");
 
   }

 
myID = parseInt(myID.substr(6,2)) ;

// switch neighbours  
// 0 is top left (0,0)
// max,max is bottom right
// get x,y position 

var x = myID % 10 ;
var y = Math.floor(myID/10);

// alert("(x,y) = " + x + ' ' + y + ' max = ' + max) ;

// 4 neighbours NSEW

// N x,y-1

newY = y - 1 ;
newX = x ;
if (newX >= 0 & newY >=0 & newX <= max & newY <= max)
{switchLights(myClass,newX,newY)}


// S x,y+1

newY = y + 1 ;
newX = x ;
if (newX >= 0 & newY >=0 & newX <= max & newY <= max)
{switchLights(myClass,newX,newY)}

// E x+1,y

newY = y  ;
newX = x + 1;
if (newX >= 0 & newY >=0 & newX <= max & newY <= max)
{switchLights(myClass,newX,newY)}

// W x-1,y

newY = y ;
newX = x - 1 ;
if (newX >= 0 & newY >=0 & newX <= max & newY <= max)
{switchLights(myClass,newX,newY)}


completed = checkFinished(max) ;




 if (completed)
  {
var m = parseInt(max) + 1  ;    
var l = '#level-'+m ; 
     

$(l).show() ;
alert('Good') ;

for (var i = 1; i <= 5; i++)
 { $('[id^=light]').fadeOut(1000) ;
  $('[id^=light]').fadeIn(1000) ; }
}






     })




  </script>
