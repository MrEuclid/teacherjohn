<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jump The Peg! (5 Rows)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #f0f8ff;
            --peg-color: #2e86c1;
            --peg-selected: #e74c3c;
            --hole-color: #d6dbdf;
            --board-bg: #ffffff;
            --gold-color: #f1c40f;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            text-align: center;
            user-select: none;
        }

        h1 { color: #2c3e50; margin: 10px 0; font-size: 2rem; }
        
        #top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: white;
            padding: 8px 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-size: 1.1rem;
            font-weight: bold;
            color: #34495e;
        }

        .game-board {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 25px;
            background: var(--board-bg);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .game-board.game-over { border: 4px solid #e74c3c; opacity: 0.8; }
        .game-board.game-won { border: 4px solid #27ae60; background-color: #eafaf1; }

        .row { display: flex; justify-content: center; gap: 10px; }

        .hole {
            width: 50px; /* Slightly smaller to fit 5/6 rows nicely */
            height: 50px;
            border-radius: 50%;
            background-color: var(--hole-color);
            cursor: pointer;
            position: relative;
            border: 2px solid transparent;
            -webkit-tap-highlight-color: transparent;
        }

        .hole.has-peg::after {
            content: '';
            position: absolute;
            top: 4px; left: 4px;
            width: 42px; height: 42px;
            background-color: var(--peg-color);
            border-radius: 50%;
            box-shadow: inset -3px -3px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .hole.selected::after {
            background-color: var(--peg-selected);
            transform: scale(1.15);
            box-shadow: 0 0 10px var(--peg-selected);
        }

        .hole.winner::after {
            background-color: var(--gold-color);
            box-shadow: 0 0 20px var(--gold-color);
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        #message-area {
            min-height: 50px;
            font-weight: bold;
            font-size: 1.3rem;
            color: #e67e22;
            margin-bottom: 10px;
            padding: 0 10px;
        }

        .controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

        button {
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: transform 0.1s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        button:active { transform: translateY(4px); box-shadow: none; }
        button:hover { filter: brightness(110%); }

        .btn-restart { background-color: #95a5a6; color: white; }
        .btn-next { background-color: #8e44ad; color: white; display: none; }
        .btn-practice { background-color: #f39c12; color: white; }
        
        .btn-next.show { display: block; animation: pulse-btn 1.5s infinite; }
        
        @keyframes pulse-btn {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

    </style>
</head>
<body>
<div class="p-3">
    <a href="/index.php" class="btn btn-outline-secondary fw-bold shadow-sm">
        ← Back to Home
    </a
    <h1>🧩 Jump The Peg!</h1>

    <div id="top-bar">
        <div class="stat-box" id="level-label">Level: Tutorial</div>
        <div class="stat-box">Pegs Left: <span id="pegs-count">0</span></div>
    </div>
    
    <div id="message-area">Loading...</div>

    <div id="game-container" class="game-board"></div>

    <div class="controls">
        <button class="btn-practice" onclick="startTutorial()">👶 Tutorial</button>
        <button class="btn-restart" onclick="resetLevel()">🔄 Restart Level</button>
        <button id="next-level-btn" class="btn-next" onclick="nextLevel()">🚀 Next Level!</button>
    </div>

    <script>
        // --- CONFIG ---
        let currentRows = 4; 
        let isTutorial = true;
        let boardState = {}; 
        let selectedPeg = null; 
        let pegsLeft = 0;
        let isGameOver = false;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // --- AUDIO ENGINE ---
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'select') {
                osc.frequency.setValueAtTime(300, now);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start();
                osc.stop(now + 0.1);
            } else if (type === 'jump') {
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.15);
                osc.start();
                osc.stop(now + 0.15);
            } else if (type === 'win') {
                [440, 554, 659].forEach((freq, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.frequency.value = freq;
                    g.gain.setValueAtTime(0.1, now + (i*0.1));
                    g.gain.linearRampToValueAtTime(0, now + (i*0.1) + 0.5);
                    o.start(now + (i*0.1));
                    o.stop(now + (i*0.1) + 0.5);
                });
            } else if (type === 'lose') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.5);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start();
                osc.stop(now + 0.5);
            }
        }

        // --- GAME LOGIC ---
        function initGame(rows, tutorialMode = false) {
            currentRows = rows;
            isTutorial = tutorialMode;
            const container = document.getElementById('game-container');
            container.innerHTML = '';
            container.className = 'game-board'; // Reset
            
            boardState = {};
            selectedPeg = null;
            pegsLeft = 0;
            isGameOver = false;
            
            // Labels (UPDATED FOR 5 ROWS)
            let levelName = "";
            if(tutorialMode) levelName = "Tutorial (3 Moves to Win!)";
            else if(rows === 5) levelName = "Level 1 (Standard 15 Pegs)";
            else if(rows === 6) levelName = "Level 2 (Master 21 Pegs)";
            else levelName = `Level ${rows}`;
            
            document.getElementById('level-label').innerText = levelName;

            // Build Grid
            for (let r = 0; r < rows; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                for (let c = 0; c <= r; c++) {
                    const hole = document.createElement('div');
                    hole.className = 'hole';
                    hole.id = `hole-${r}-${c}`;
                    hole.onclick = () => handleClick(r, c);
                    
                    let hasPeg = false;

                    if (tutorialMode) {
                        // SPECIAL EASY SETUP: A 4-peg "Diamond" that is easy to win
                        if ( (r===0 && c===0) || (r===1 && c===0) || (r===1 && c===1) || (r===2 && c===1) ) {
                            hasPeg = true;
                        }
                    } else {
                        // STANDARD SETUP: All full except top
                        if (!(r === 0 && c === 0)) {
                            hasPeg = true;
                        }
                    }

                    if (hasPeg) {
                        boardState[`${r}-${c}`] = true;
                        hole.classList.add('has-peg');
                        pegsLeft++;
                    } else {
                        boardState[`${r}-${c}`] = false;
                    }
                    
                    rowDiv.appendChild(hole);
                }
                container.appendChild(rowDiv);
            }
            
            updateUI();
            document.getElementById('next-level-btn').classList.remove('show');
            setMessage("Select a blue peg to jump!", "#2980b9");
        }

        function updateUI() { document.getElementById('pegs-count').innerText = pegsLeft; }
        
        function setMessage(text, color) {
            const msg = document.getElementById('message-area');
            msg.innerText = text;
            msg.style.color = color;
        }

        // STARTUP: Start in Tutorial, but Next Level goes to 5 rows
        function startTutorial() { initGame(4, true); }
        
        function resetLevel() { initGame(currentRows, isTutorial); }
        
        function nextLevel() {
            if(isTutorial) {
                // UPDATE: Jump straight to 5 rows for Level 1
                initGame(5, false); 
            }
            else if (currentRows < 6) {
                initGame(currentRows + 1, false);
            }
            else {
                // Replay Master if they click next again
                initGame(6, false); 
            }
        }

        function handleClick(r, c) {
            if (isGameOver) return;
            const hasPeg = boardState[`${r}-${c}`];

            if (hasPeg) {
                if (selectedPeg) document.getElementById(`hole-${selectedPeg.r}-${selectedPeg.c}`).classList.remove('selected');
                selectedPeg = {r, c};
                document.getElementById(`hole-${r}-${c}`).classList.add('selected');
                playSound('select');
                setMessage("Now click a hole to jump into!", "#27ae60");
            } 
            else if (!hasPeg && selectedPeg) {
                attemptMove(selectedPeg, {r, c});
            }
        }

        function attemptMove(start, end) {
            const midR = (start.r + end.r) / 2;
            const midC = (start.c + end.c) / 2;

            if (!Number.isInteger(midR) || !Number.isInteger(midC)) { shakeBoard(); return; }
            if (!boardState[`${midR}-${midC}`]) { shakeBoard(); return; }

            const dR = Math.abs(start.r - end.r);
            const dC = Math.abs(start.c - end.c);
            const isValid = (dR === 0 && dC === 2) || (dR === 2 && dC === 0) || (dR === 2 && dC === 2);
            
            if (!isValid) { shakeBoard(); return; }

            // Execute Move
            boardState[`${start.r}-${start.c}`] = false;
            document.getElementById(`hole-${start.r}-${start.c}`).classList.remove('has-peg', 'selected');

            boardState[`${midR}-${midC}`] = false;
            document.getElementById(`hole-${midR}-${midC}`).classList.remove('has-peg');

            boardState[`${end.r}-${end.c}`] = true;
            document.getElementById(`hole-${end.r}-${end.c}`).classList.add('has-peg');

            playSound('jump');
            selectedPeg = null;
            pegsLeft--;
            updateUI();
            checkGameState();
        }

        function shakeBoard() {
            const board = document.getElementById('game-container');
            board.style.transform = "translateX(5px)";
            setTimeout(() => board.style.transform = "translateX(-5px)", 50);
            setTimeout(() => board.style.transform = "translateX(0)", 100);
            setMessage("❌ Too far! You can only jump over one peg.", "#c0392b");
        }

        function checkGameState() {
            if (pegsLeft === 1) {
                isGameOver = true;
                playSound('win');
                launchConfetti();
                
                document.getElementById('game-container').classList.add('game-won');
                for(let key in boardState) {
                    if(boardState[key]) document.getElementById(`hole-${key}`).classList.add('winner');
                }

                if (isTutorial) {
                    setMessage("🏆 NICE! Now try the real board!", "#27ae60");
                } else if (currentRows < 6) {
                    setMessage("🏆 YOU WIN! Click 'Next Level'!", "#27ae60");
                } else {
                    setMessage("👑 GRAND MASTER! YOU BEAT THE GAME!", "#8e44ad");
                }
                document.getElementById('next-level-btn').classList.add('show');
            } 
            else if (!hasValidMovesLeft()) {
                isGameOver = true;
                playSound('lose');
                document.getElementById('game-container').classList.add('game-over');
                setMessage("No more moves! Click 'Restart' to try again.", "#e74c3c");
            }
        }

        function hasValidMovesLeft() {
            const jumps = [[0, 2], [0, -2], [2, 0], [2, 2], [-2, 0], [-2, -2]];
            for (let r = 0; r < currentRows; r++) {
                for (let c = 0; c <= r; c++) {
                    if (boardState[`${r}-${c}`]) {
                        for (let j of jumps) {
                            const destR = r + j[0];
                            const destC = c + j[1];
                            const midR = r + j[0]/2;
                            const midC = c + j[1]/2;
                            if (destR >= 0 && destR < currentRows && destC >= 0 && destC <= destR) {
                                if (!boardState[`${destR}-${destC}`] && boardState[`${midR}-${midC}`]) {
                                    return true;
                                }
                            }
                        }
                    }
                }
            }
            return false;
        }

        function launchConfetti() { confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); }

        // START IN TUTORIAL MODE
        startTutorial();

    </script>
</body>
</html>
