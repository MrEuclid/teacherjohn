<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Map Project</title>
    
    <!-- Load Leaflet styling from Cloudflare -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" crossorigin="anonymous" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 85vh; width: 100%; background-color: #e5e3df; }
        #info-panel { height: 15vh; padding: 10px; background: #f8f9fa; text-align: center; box-sizing: border-box; }
        button { padding: 8px 16px; font-size: 14px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background-color: #fff; }
        button:hover { background-color: #e9ecef; }
    </style>
</head>
<body>

    <!-- The Map Frame Box -->
    <div id="map"></div>
    
    <!-- Lower Info Display Dashboard -->
    <div id="info-panel">
        <h3>Classroom Distance Calculator</h3>
        <p id="distance-output">Click two places on the map to find the distance.</p>
        <button onclick="resetMap()">Clear Pins</button>
    </div>

    <!-- Load the Leaflet Library Script -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js" crossorigin="anonymous"></script>

    <!-- Load your clean custom classroom mapping code -->
    <script src="map-logic.js"></script>

</body>
</html>
