    <script>
      $(document).ready(function() {
        $('#register').on('click', function(){

       teamName = $('#teamName').val() ;
    
        $.ajax({
        type:"POST",
        url: "checkTeamName.php",
        data:{teamName:teamName},
        success: function(data){
        console.log(data) ;
        alert(data) ;
       
    if (data == 0)
     {
       $('#registrationMessage').text('You must give your team a name.') ;
       $('#team').val('') ;
     }  
     else 
        if (data == 1)
        {
            $('#registrationMessage').text('Your team name is already used.') ;
       $('#team').val('') ;
        }
    
    else 
        if (data == 32)
        {
            $('#registrationMessage').text('Your team name too long.') ;
       $('#team').val('') ;
        }
     else
     {

        var t =  data.split('*');
$('#teamDetails').text(data) ;
$('#registrationMessage').text('OK');
       $('#team').val(t[1]) ;
       $('#team').prop('readonly', true);
       $('#registration').hide() ;
       $('#teamID').val(t[0]) ;
       $('#provinces').show() ;
       $('#controls').show() ;
     }
        }
    });

        })
      })
</script>
