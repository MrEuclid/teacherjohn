<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Number Race Challenge</title>
   
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script type="text/x-mathjax-config">
        MathJax.Hub.Config({
            extensions: ["tex2jax.js"],
            jax: ["input/TeX","output/HTML-CSS"],
            tex2jax: {inlineMath: [["$","$"],["\\(","\\)"]]}
        });
    </script>
    <script type="text/javascript" async src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js"></script>

    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; padding-top: 20px; padding-bottom: 50px; }
        
        /* Setup Screen */
        .setup-card { max-width: 500px; margin: 40px auto; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: none; }
        
        /* Game Dashboard */
        .dash-header { background: #212529; color: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .target-box { background: #ffc107; color: #212529; font-size: 4rem; font-weight: 900; border-radius: 15px; padding: 10px 30px; display: inline-block; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .stat-box { font-family: monospace; font-size: 1.8rem; font-weight: bold; }
        
        /* Equation Builder Area */
        .equation-area { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 2px solid #e9ecef;}
        .calc-slot { width: 80px; height: 80px; font-size: 2rem; font-weight: bold; border-radius: 15px; display: flex; align-items: center; justify-content: center; background: #f8f9fa; border: 2px dashed #adb5bd; color: #495057; cursor: pointer; transition: 0.2s;}
        .calc-slot.filled { background: #e7f1ff; border: 2px solid #0d6efd; color: #0d6efd; }
        .btn-go { height: 80px; font-size: 1.8rem; font-weight: bold; border-radius: 15px; }

        /* Game Buttons (Tiles) */
        .game-btn { height: 70px; font-size: 2rem; font-weight: bold; border-radius: 12px; transition: transform 0.1s, box-shadow 0.1s; display: flex; align-items: center; justify-content: center;}
        .game-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 10px rgba(0,0,0,0.15); }
        .btn-num { background-color: #0dcaf0; color: #000; border: none; }
        .btn-num:hover { background-color: #31d2f2; color: #000;}
        .btn-op { background-color: #6c757d; color: white; border: none; }
        .btn-op:hover { background-color: #5c636a; color: white; }
    </style>
</head>
<body>

<div class="container">

    <div id="registration" class="card setup-card p-5 text-center">
        <h1 class="fw-bold text-primary mb-4">Number Race</h1>
        <p class="text-muted mb-4">How quickly can you use the numbers to find the target?</p>
        
        <div class="mb-4">
            <label class="form-label fw-bold">Enter Your Team Name</label>
            <input type="text" id="teamName" class="form-control form-control-lg text-center fw-bold" placeholder="e.g., The Mathletes">
        </div>
        
        <p id="errorMsg" class="text-danger fw-bold"></p>
        <button id="registerBtn" class="btn btn-primary btn-lg w-100 fw-bold shadow">Start Game 🚀</button>
    </div>

    <div id="gameArea" style="display:none;">
        
        <div class="dash-header d-flex justify-content-between align-items-center">
            <div>
                <h4 class="m-0 fw-bold text-info" id="ourTeam">Team Name</h4>
                <div id="starsDisplay" class="fs-4 text-warning mt-1"></div>
            </div>
            <div class="text-center">
                <div class="small text-uppercase fw-bold opacity-75">Target Number</div>
                <div class="target-box" id="targetDisplay">0</div>
            </div>
            <div class="text-end">
                <div class="small text-uppercase fw-bold opacity-75 text-danger">Time Left</div>
                <div class="stat-box text-danger" id="timerDisplay">45:00</div>
                <div class="small text-uppercase fw-bold opacity-75 text-success mt-2">Score</div>
                <div class="stat-box text-success" id="scoreDisplay">0</div>
            </div>
        </div>

        <div class="equation-area">
            <div class="d-flex justify-content-center align-items-center gap-3 mb-2">
                <div id="operand1" class="calc-slot"></div>
                <div id="operatorBox" class="calc-slot border-0 bg-transparent fs-1 text-dark" style="width: 50px;">?</div>
                <div id="operand2" class="calc-slot"></div>
                <div class="fs-1 fw-bold text-muted mx-2">=</div>
                <button id="btnGo" class="btn btn-success btn-go px-5 shadow" disabled>CALCULATE</button>
            </div>
            <p class="text-center text-muted small mt-3 m-0">Click your numbers and an operation, then click Calculate.</p>
        </div>

        <div class="row g-3 justify-content-center mb-4">
            <div class="col-2"><button class="btn btn-op game-btn w-100 op-btn" data-val="+">+</button></div>
            <div class="col-2"><button class="btn btn-op game-btn w-100 op-btn" data-val="-">-</button></div>
            <div class="col-2"><button class="btn btn-op game-btn w-100 op-btn" data-val="*">×</button></div>
            <div class="col-2"><button class="btn btn-op game-btn w-100 op-btn" data-val="/">÷</button></div>
        </div>

        <div class="row g-3 justify-content-center mb-5" id="numberPad">
            </div>

        <div class="text-center">
            <button id="btnClear" class="btn btn-outline-danger btn-lg px-5 fw-bold me-3">Reset Try</button>
            <button id="btnQuit" class="btn btn-outline-secondary btn-lg px-5 fw-bold">Quit Game</button>
        </div>

    </div>

</div>

<script>
$(document).ready(function() {
    
    // --- GAME STATE VARIABLES ---
    let teamName = "";
    let data2 = []; // Holds the puzzles from DB
    let wins = 0;
    let currentScore = 0;
    
    let target = 0;
    let originalNumbers = []; // The starting 4 numbers
    let currentNumbers = [];  // The numbers currently available to click

    let activeOp1 = null;
    let activeOp2 = null;
    let activeOperator = null; // Stores actual math symbol (+, -, *, /)

    let timerInterval;

    // --- INITIALIZATION & AJAX ---
    // Pre-fetch equations from database right away
    $.ajax({
        url: 'loadEquations.php', 
        type: 'POST',
        data: { level: 1 }, // Default level for now
        dataType: 'json'
    }).done(function (response) { 
        for (let i = 0; i < response.length; i++) {
            data2.push([response[i]["target"], response[i]["puzzle"]]);
        }
        console.log("Puzzles loaded:", data2);
    }).fail(function (jqXHR, textStatus, errorThrown) { 
        console.error("Failed to load equations:", textStatus, errorThrown);
    });

    // --- REGISTRATION & START ---
    $('#registerBtn').click(function() {
        teamName = $('#teamName').val().trim();
        if (teamName.length === 0) {
            $('#errorMsg').text("Please enter your team name to begin!");
            return;
        }

        // Add random ID tag
        let n = Math.floor((Math.random() * 899) + 100);   
        teamName = teamName + '-#' + n;
        
        $('#ourTeam').text(teamName);
        $('#registration').hide();
        $('#gameArea').fadeIn();

        startTimer(45 * 60); // 45 Minutes
        loadLevel(wins);
    });

    function startTimer(duration) {
        let timer = duration, minutes, seconds;
        timerInterval = setInterval(function () {
            minutes = parseInt(timer / 60, 10);
            seconds = parseInt(timer % 60, 10);

            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            $('#timerDisplay').text(minutes + ":" + seconds);

            if (--timer < 0) {
                clearInterval(timerInterval);
                $('#timerDisplay').text('00:00');
                alert("Time is up! Game Over.");
                location.reload();
            }
        }, 1000);
    }

    // --- LEVEL MANAGEMENT ---
    function loadLevel(levelIndex) {
        if (!data2[levelIndex]) {
            alert("Congratulations! You've completed all puzzles!");
            return;
        }

        target = parseInt(data2[levelIndex][0]);
        let pString = data2[levelIndex][1]; 
        
        // Clean puzzle string (e.g., "*2*7*13*14*")
        pString = pString.replace(/^\*|\*$/g, ''); 
        let strNums = pString.split("*");
        
        originalNumbers = strNums.map(Number).sort((a,b) => a - b);
        currentNumbers = [...originalNumbers];

        $('#targetDisplay').text(target);
        resetBuilder();
        renderNumberPad();
    }

    function renderNumberPad() {
        $('#numberPad').empty();
        currentNumbers.sort((a,b) => a - b);
        
        currentNumbers.forEach((num, index) => {
            let btnHtml = `
            <div class="col-3 col-md-2">
                <button class="btn btn-num game-btn w-100 num-btn" data-index="${index}" data-val="${num}">${num}</button>
            </div>`;
            $('#numberPad').append(btnHtml);
        });

        // Attach click handlers to new buttons
        $('.num-btn').click(handleNumberClick);
    }

    function resetBuilder() {
        activeOp1 = null;
        activeOp2 = null;
        activeOperator = null;
        
        $('#operand1').text('').removeClass('filled');
        $('#operand2').text('').removeClass('filled');
        $('#operatorBox').text('?').removeClass('text-primary');
        $('#btnGo').prop('disabled', true);
    }

    // --- GAMEPLAY LOGIC ---
    function handleNumberClick() {
        let val = $(this).data('val');
        let index = $(this).data('index');

        if (activeOp1 === null) {
            activeOp1 = val;
            $('#operand1').text(val).addClass('filled');
        } else if (activeOp2 === null) {
            activeOp2 = val;
            $('#operand2').text(val).addClass('filled');
        } else {
            return; // Both slots full
        }

        // Remove from available numbers and re-render
        currentNumbers.splice(index, 1);
        renderNumberPad();
        checkReady();
    }

    $('.op-btn').click(function() {
        activeOperator = $(this).data('val');
        let displaySymbol = $(this).text(); // Gets the visual × or ÷
        $('#operatorBox').text(displaySymbol).addClass('text-primary');
        checkReady();
    });

    function checkReady() {
        if (activeOp1 !== null && activeOp2 !== null && activeOperator !== null) {
            $('#btnGo').prop('disabled', false);
        } else {
            $('#btnGo').prop('disabled', true);
        }
    }

    // Calculate Button
    $('#btnGo').click(function() {
        // Evaluate the math safely
        let result = 0;
        if (activeOperator === '+') result = activeOp1 + activeOp2;
        if (activeOperator === '-') result = activeOp1 - activeOp2;
        if (activeOperator === '*') result = activeOp1 * activeOp2;
        if (activeOperator === '/') result = activeOp1 / activeOp2;

        // Ensure decimals are handled if division doesn't produce an integer (optional, based on your game rules)
        result = parseFloat(result.toFixed(2)); 

        currentNumbers.push(result);
        
        if (currentNumbers.length === 1) {
            // Final number left, check if it matches target
            if (currentNumbers[0] === target) {
                wins++;
                currentScore = wins * 10;
                $('#scoreDisplay').text(currentScore);
                $('#starsDisplay').append('⭐');
                
                // Write to DB
                let puzzleStr = "*" + originalNumbers.join("*") + "*TARGET " + target;
                $.post('writeDataNumbers.php', { team: teamName, puzzle: puzzleStr, score: 10 });

                alert("Target Reached! Well done.");
                loadLevel(wins);
            } else {
                alert("You ended up with " + currentNumbers[0] + ". Try again!");
                $('#btnClear').click(); // Auto-reset
            }
        } else {
            // Still numbers left to calculate
            resetBuilder();
            renderNumberPad();
        }
    });

    // Clear / Reset Level
    $('#btnClear').click(function() {
        currentNumbers = [...originalNumbers];
        resetBuilder();
        renderNumberPad();
    });

    // Quit Game
    $('#btnQuit').click(function() {
        if(confirm("Are you sure you want to quit?")) {
            window.location.href = "../index.php";
        }
    });

});
</script>

</body>
</html>
