<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pyramid Game G3 - G4</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .header-section { margin-top: 20px; margin-bottom: 20px; }
        
        /* Pyramid Flexbox Layout */
        .pyramid-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
        }

        .pyramid-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .pyramid-box {
            width: 80px;
            height: 80px;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            border-radius: 15px;
            border: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        input.pyramid-box {
            border: 4px solid #ffc107;
            background-color: #fffde7;
            color: #d32f2f;
            outline: none;
            transition: transform 0.2s ease;
        }
        
        input.pyramid-box:focus { transform: scale(1.1); border-color: #0d6efd; }
        input.pyramid-box:disabled { background-color: #e9ecef; border-color: #ced4da; color: #6c757d; }

        .display-box { background-color: #198754; color: white; display: flex; align-items: center; justify-content: center; }
        .top-box { background-color: #0dcaf0; color: #000; transition: background-color 0.5s ease; }

        /* General UI */
        .big-text { font-size: 1.4rem; font-weight: bold; width: 160px; }
        .camel-reward { width: 50px; height: auto; margin: 3px; animation: popIn 0.5s ease; }
        .target-card { background: white; border-radius: 15px; border: 3px dashed #0d6efd; padding: 20px; }
        
        .star-container { min-height: 25px; font-size: 1.2rem; letter-spacing: 2px; }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
</head>

<body>

<div class="p-3">
    <a href="/index.php" class="btn btn-outline-secondary fw-bold">
        ← Back to Home
    </a>
</div>

<div class="container pb-5">
    <div class="header-section text-center">
        <h1 class="display-6 fw-bold text-primary">Pyramid Game (G3 - G4)</h1>
    </div>

    <div class="row justify-content-center text-center mb-4">
        <div class="col-md-9 target-card shadow-sm">
            <h3 class="text-secondary">Target Goal: <span id="targetGoal" class="text-danger fw-bold display-4">0</span></h3>
            <h5 class="text-muted mt-2" id="currentOpDisplay">Select an operation below to start</h5>
            <hr>
            
            <div class="d-flex justify-content-center gap-4 flex-wrap mt-3">
                <div class="op-wrapper">
                    <button id="btnAdd" class="btn btn-success btn-lg big-text shadow-sm">+ Add</button>
                    <div id="starsAdd" class="star-container mt-2 text-warning"></div>
                </div>
                <div class="op-wrapper">
                    <button id="btnSub" class="btn btn-primary btn-lg big-text shadow-sm">- Subtract</button>
                    <div id="starsSub" class="star-container mt-2 text-warning"></div>
                </div>
                <div class="op-wrapper">
                    <button id="btnMul" class="btn btn-danger btn-lg big-text shadow-sm">× Multiply</button>
                    <div id="starsMul" class="star-container mt-2 text-warning"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="pyramid-container">
        <div class="pyramid-row">
            <div id="l3-1" class="pyramid-box display-box top-box">?</div>
        </div>
        
        <div class="pyramid-row">
            <div id="l2-1" class="pyramid-box display-box">?</div>
            <div id="operatorSymbol" class="align-self-center fs-2 fw-bold text-secondary mx-2"></div>
            <div id="l2-2" class="pyramid-box display-box">?</div>
        </div>

        <div class="pyramid-row" id="inputs-container" style="visibility: hidden;">
            <input type="number" id="l1-1" class="pyramid-box base-input" autocomplete="off">
            <input type="number" id="l1-2" class="pyramid-box base-input" autocomplete="off">
            <input type="number" id="l1-3" class="pyramid-box base-input" autocomplete="off">
        </div>
    </div>

    <div class="text-center mt-4">
        <h3 class="fw-bold">Total Score: <span id="scoreDisplay" class="text-success">0</span></h3>
        <div id="camels" class="mt-3 bg-white p-3 rounded shadow-sm d-flex flex-wrap justify-content-center align-items-center" style="min-height: 80px;">
            <p class="text-muted mb-0" id="camelPlaceholder">Your camels will appear here!</p>
        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    
    let currentOp = null;
    let targetGoal = 0;
    let score = 0;
    let keystrokes = 0;
    
    // Mastery Tracking
    const MAX_STARS = 10;
    let stars = { '+': 0, '-': 0, '*': 0 };

    $('#btnAdd').click(() => startGame('+'));
    $('#btnSub').click(() => startGame('-'));
    $('#btnMul').click(() => startGame('*'));

    function startGame(operation) {
        if (stars[operation] >= MAX_STARS) return; // Failsafe

        currentOp = operation;
        keystrokes = 0;
        
        // Reset the pyramid visuals
        $('.base-input').val('').prop('disabled', false);
        $('#l2-1, #l2-2').text('?');
        $('#l3-1').text('?').css('background-color', '#0dcaf0'); 
        $('#inputs-container').css('visibility', 'visible');
        $('#camelPlaceholder').hide();
        
        let symbol = operation === '*' ? '×' : operation;
        $('#operatorSymbol').text(symbol);
        $('#currentOpDisplay').html(`Build a pyramid using <strong>${symbol}</strong>`);

        // Generate Target
        if (operation === '+') {
            targetGoal = Math.floor(Math.random() * 30) + 20; 
        } 
        else if (operation === '-') {
            let b3 = Math.floor(Math.random() * 5) + 1; 
            let b2 = b3 + Math.floor(Math.random() * 5) + 1; 
            let m2 = b2 - b3;
            let m1 = m2 + Math.floor(Math.random() * 5) + 1; 
            targetGoal = m1 - m2;
        } 
        else if (operation === '*') {
            let b1 = Math.floor(Math.random() * 3) + 1; 
            let b2 = Math.floor(Math.random() * 3) + 1; 
            let b3 = Math.floor(Math.random() * 3) + 1; 
            targetGoal = (b1 * b2) * (b2 * b3);
        }

        $('#targetGoal').text(targetGoal);
        $('#l1-1').focus(); // Auto-focus the first box for faster play
    }

    function renderStars() {
        $('#starsAdd').text('⭐'.repeat(stars['+']));
        $('#starsSub').text('⭐'.repeat(stars['-']));
        $('#starsMul').text('⭐'.repeat(stars['*']));
    }

    function lockOperation(operation) {
        if (operation === '+') { $('#btnAdd').prop('disabled', true).removeClass('btn-success').addClass('btn-secondary'); }
        if (operation === '-') { $('#btnSub').prop('disabled', true).removeClass('btn-primary').addClass('btn-secondary'); }
        if (operation === '*') { $('#btnMul').prop('disabled', true).removeClass('btn-danger').addClass('btn-secondary'); }
        
        $('#currentOpDisplay').html(`<span class="text-success fw-bold">Mastery Achieved!</span> Please select a different operation.`);
        currentOp = null; // Force them to pick a new one
        $('#inputs-container').css('visibility', 'hidden');
        $('#operatorSymbol').text('');
        $('#targetGoal').text('0');
        
        // Check for Grand Victory
        if (stars['+'] === MAX_STARS && stars['-'] === MAX_STARS && stars['*'] === MAX_STARS) {
            $('#currentOpDisplay').html(`<span class="text-success fw-bold fs-3">🏆 YOU BEAT THE WHOLE GAME! 🏆</span>`);
        }
    }

    $('.base-input').on("input", function() {
        if (!currentOp) return;
        keystrokes++; 

        let a = parseInt($('#l1-1').val()) || 0;
        let b = parseInt($('#l1-2').val()) || 0;
        let c = parseInt($('#l1-3').val()) || 0;
        let m1 = 0, m2 = 0, top = 0;

        if (currentOp === '+') { m1 = a + b; m2 = b + c; top = m1 + m2; } 
        else if (currentOp === '-') { m1 = a - b; m2 = b - c; top = m1 - m2; } 
        else if (currentOp === '*') { m1 = a * b; m2 = b * c; top = m1 * m2; }

        $('#l2-1').text(m1);
        $('#l2-2').text(m2);
        $('#l3-1').text(top);

        // Win Condition Hit
        if (top === targetGoal && (m1 * m2 * top !== 0)) {
            
            // UI Feedback
            $('#l3-1').css('background-color', '#ffc107'); 
            $('.base-input').prop('disabled', true); // Lock inputs
            
            // Score & Camels
            let roundPoints = Math.max(0, 30 - keystrokes);
            score += roundPoints;
            $('#scoreDisplay').text(score);
            $('#camels').append('<img src="/images/egypt/camel.png" class="camel-reward">');
            
            // Update Stars
            stars[currentOp]++;
            renderStars();

            // Check Mastery vs Next Round
            if (stars[currentOp] >= MAX_STARS) {
                setTimeout(() => lockOperation(currentOp), 1000);
            } else {
                // Auto-load next puzzle of the same operation after 1.5 seconds
                $('#currentOpDisplay').html(`<span class="text-success fw-bold">Correct! Loading next...</span>`);
                let savedOp = currentOp;
                setTimeout(() => startGame(savedOp), 1500);
            }
        }
    });

});
</script>

</body>
</html>
