<script>

function continuedFraction(cf) {
  // Initialize variables for numerator and denominator
  let numerator = cf[cf.length - 1];
  let denominator = 1;

  // Iterate through the continued fraction list in reverse order
  for (let i = cf.length - 2; i >= 0; i--) {
    // Update numerator and denominator using recursion
    const temp = numerator;
    numerator = denominator;
    denominator = temp + cf[i] * denominator;
    console.log(i,numerator,denominator);
  }

  // Return the final fraction
  return numerator / denominator;
}

// Continued fraction representation
let cf = [3, 7, 15, 1];

// Evaluate the continued fraction
let  result = continuedFraction(cf);
// alert(result);
// Print the result
console.log(result);
</script>

<script type="text/javascript">


function continuedFractionConvergents(cf) {
  // Initialize empty arrays for numerators and denominators
  const numerators = [];
  const denominators = [];
  let max = cf.length;

  // Handle edge case for single element
  if (cf.length === 1) {
    numerators.push(cf[0]);
    denominators.push(1);
    return { numerators, denominators };
  }

  // Initialize first two convergents
  numerators.push(cf[0]);
  denominators.push(1);
  numerators.push(cf[0] * cf[1] + 1);
  denominators.push(cf[1]);

  // Calculate remaining convergents up to max (or all)
  for (let i = 2; i < max; i++) {
    const newNumerator = numerators[i - 1] * cf[i] + numerators[i - 2];
    const newDenominator = denominators[i - 1] * cf[i] + denominators[i - 2];
    numerators.push(newNumerator);
    denominators.push(newDenominator);
    console.log(i, numerators,denominators);
  }

  return { numerators, denominators };
}



</script>
