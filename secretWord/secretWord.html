<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>5-Letter ESL Word Challenge</title>
   
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">

    <style>
        body { background-color: #f8f9fa; display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
        
        .header { text-align: center; padding: 15px 0; border-bottom: 1px solid #dee2e6; background: white; margin-bottom: 20px;}
        .stats-badge { font-size: 1.2rem; font-weight: bold; }

        /* The Game Grid */
        #board { display: grid; grid-template-rows: repeat(6, 1fr); grid-gap: 5px; padding: 10px; width: 100%; max-width: 350px; margin: 0 auto; }
        .row-grid { display: grid; grid-template-columns: repeat(5, 1fr); grid-gap: 5px; }
        .tile { 
            width: 100%; aspect-ratio: 1; border: 2px solid #dee2e6; 
            font-size: 2rem; font-weight: bold; display: flex; align-items: center; 
            justify-content: center; text-transform: uppercase; background: white;
            transition: transform 0.1s, background-color 0.4s, border-color 0.4s;
        }

        /* Tile Status Colors */
        .correct { background-color: #198754 !important; color: white !important; border-color: #198754 !important; }
        .present { background-color: #ffc107 !important; color: white !important; border-color: #ffc107 !important; }
        .absent { background-color: #6c757d !important; color: white !important; border-color: #6c757d !important; }
        .active-tile { border-color: #adb5bd; transform: scale(1.05); }

        /* The On-Screen Keyboard */
        #keyboard { margin: 20px auto 10px; max-width: 500px; width: 100%; padding: 0 5px;}
        .kb-row { display: flex; justify-content: center; margin-bottom: 8px; gap: 4px; }
        .kb-key { 
            font-weight: bold; font-size: 1.1rem; border: none; border-radius: 4px; 
            background-color: #d3d6da; cursor: pointer; user-select: none; flex: 1; 
            padding: 15px 0; text-transform: uppercase; transition: background-color 0.2s;
        }
        .kb-key.wide { flex: 1.5; font-size: 0.9rem;}
        
        /* Message Popup & Shake Animation */
        #message-container { position: fixed; top: 12%; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .message { background-color: #212529; color: white; padding: 12px 20px; border-radius: 8px; font-weight: bold; opacity: 1; transition: opacity 0.5s; }
        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="header shadow-sm">
        <h2 class="text-primary fw-bold text-uppercase m-0">ESL Word Challenge</h2>
        <div class="mt-2">
            <span class="badge bg-secondary stats-badge me-2 shadow-sm">Words: <span id="wordCount">0</span></span>
            <span class="badge bg-success stats-badge shadow-sm">Score: <span id="score">0</span></span>
        </div>
        <div class="mt-2 text-warning fs-4 fw-bold" id="stars"></div>
    </div>

    <div id="message-container"></div>

    <div class="flex-grow-1">
        <div id="board">
            </div>
    </div>

    <div id="keyboard">
        <div class="kb-row">
            <button class="kb-key" data-key="Q">Q</button>
            <button class="kb-key" data-key="W">W</button>
            <button class="kb-key" data-key="E">E</button>
            <button class="kb-key" data-key="R">R</button>
            <button class="kb-key" data-key="T">T</button>
            <button class="kb-key" data-key="Y">Y</button>
            <button class="kb-key" data-key="U">U</button>
            <button class="kb-key" data-key="I">I</button>
            <button class="kb-key" data-key="O">O</button>
            <button class="kb-key" data-key="P">P</button>
        </div>
        <div class="kb-row">
            <button class="kb-key" data-key="A">A</button>
            <button class="kb-key" data-key="S">S</button>
            <button class="kb-key" data-key="D">D</button>
            <button class="kb-key" data-key="F">F</button>
            <button class="kb-key" data-key="G">G</button>
            <button class="kb-key" data-key="H">H</button>
            <button class="kb-key" data-key="J">J</button>
            <button class="kb-key" data-key="K">K</button>
            <button class="kb-key" data-key="L">L</button>
        </div>
        <div class="kb-row">
            <button class="kb-key wide" data-key="ENTER">ENTER</button>
            <button class="kb-key" data-key="Z">Z</button>
            <button class="kb-key" data-key="X">X</button>
            <button class="kb-key" data-key="C">C</button>
            <button class="kb-key" data-key="V">V</button>
            <button class="kb-key" data-key="B">B</button>
            <button class="kb-key" data-key="N">N</button>
            <button class="kb-key" data-key="M">M</button>
            <button class="kb-key wide" data-key="BACKSPACE">⌫</button>
        </div>
    </div>

    <div class="text-center mb-4">
        <button id="newGameBtn" class="btn btn-primary btn-lg fw-bold shadow mt-3 px-5" style="display:none;">Next Word ▶</button>
        <a href="../index.php" class="btn btn-outline-dark mt-3 px-4 ms-2 fw-bold">🏠 Home</a>
    </div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function() {
    
    let allWords = [];
    let targetWords = [];
    let secretWord = "";
    
    let currentRow = 0;
    let currentTile = 0;
    let isGameOver = false;

    let score = 0;
    let wordCount = 0;

    // Load dictionary on startup
    showMessage("Loading Dictionary...", 2000);
    $.getJSON('loadSecretWordsAll.php', function(data) {
        if(!data || data.allWords.length === 0) { 
            showMessage("Error: Database disconnected.", 5000); 
            return; 
        }
        allWords = data.allWords;
        targetWords = data.targetWords;
        resetGame();
    });

    function initBoard() {
        $('#board').empty();
        for (let r = 0; r < 6; r++) {
            let rowHtml = `<div class="row-grid" id="row-${r}">`;
            for (let c = 0; c < 5; c++) {
                rowHtml += `<div class="tile shadow-sm" id="tile-${r}-${c}"></div>`;
            }
            rowHtml += `</div>`;
            $('#board').append(rowHtml);
        }
    }

    function resetGame() {
        initBoard();
        currentRow = 0;
        currentTile = 0;
        isGameOver = false;
        $('.kb-key').removeClass('correct present absent');
        $('#newGameBtn').hide();
        
        // Pick a random ESL-friendly word
        secretWord = targetWords[Math.floor(Math.random() * targetWords.length)];
        console.log("Teacher Cheat Code! The word is: " + secretWord);
    }

    // Input Handling (Supports both screen taps and physical keyboards)
    $('.kb-key').click(function() {
        handleInput($(this).data('key'));
    });

    $(document).keydown(function(e) {
        let key = e.key.toUpperCase();
        if (key === 'ENTER' || key === 'BACKSPACE' || /^[A-Z]$/.test(key)) {
            handleInput(key);
        }
    });

    function handleInput(key) {
        if (isGameOver) return;

        if (key === 'BACKSPACE') {
            if (currentTile > 0) {
                currentTile--;
                $(`#tile-${currentRow}-${currentTile}`).text('').removeClass('active-tile');
            }
            return;
        }

        if (key === 'ENTER') {
            submitGuess();
            return;
        }

        // Add Letter
        if (currentTile < 5 && /^[A-Z]$/.test(key)) {
            $(`#tile-${currentRow}-${currentTile}`).text(key).addClass('active-tile');
            setTimeout(() => $(`#tile-${currentRow}-${currentTile-1}`).removeClass('active-tile'), 100);
            currentTile++;
        }
    }

    function submitGuess() {
        if (currentTile !== 5) {
            showMessage("Not enough letters!", 1500);
            $(`#row-${currentRow}`).addClass('shake');
            setTimeout(() => $(`#row-${currentRow}`).removeClass('shake'), 400);
            return;
        }

        let guess = "";
        for (let i = 0; i < 5; i++) {
            guess += $(`#tile-${currentRow}-${i}`).text();
        }

        // Prevent random letter spamming by checking the full dictionary
        if (!allWords.includes(guess)) {
            showMessage("Not in word list!", 1500);
            $(`#row-${currentRow}`).addClass('shake');
            setTimeout(() => $(`#row-${currentRow}`).removeClass('shake'), 400);
            return;
        }

        evaluateGuess(guess);
    }

    function evaluateGuess(guess) {
        let targetArr = secretWord.split('');
        let guessArr = guess.split('');
        let colors = Array(5).fill('absent');
        let isWin = (guess === secretWord);

        // Score logic matching your original setup
        for (let i = 0; i < 5; i++) {
            if (guessArr[i] === targetArr[i]) {
                colors[i] = 'correct';
                targetArr[i] = null; 
                guessArr[i] = null; 
            }
        }

        for (let i = 0; i < 5; i++) {
            if (guessArr[i] !== null && targetArr.includes(guessArr[i])) {
                colors[i] = 'present';
                targetArr[targetArr.indexOf(guessArr[i])] = null; 
            }
        }

        // Apply Colors to Grid & Keyboard
        for (let i = 0; i < 5; i++) {
            let letter = $(`#tile-${currentRow}-${i}`).text();
            let color = colors[i];
            
            setTimeout(() => {
                $(`#tile-${currentRow}-${i}`).addClass(color).removeClass('active-tile');
                
                let keyBtn = $(`.kb-key[data-key='${letter}']`);
                if (!keyBtn.hasClass('correct')) {
                    if (color === 'correct') {
                        keyBtn.removeClass('present absent').addClass('correct');
                    } else if (color === 'present' && !keyBtn.hasClass('absent')) {
                        keyBtn.addClass('present');
                    } else if (color === 'absent' && !keyBtn.hasClass('present')) {
                        keyBtn.addClass('absent');
                    }
                }
            }, i * 150); // Flip effect delay
        }

        setTimeout(() => {
            if (isWin) {
                isGameOver = true;
                
                // Keep your original scoring: base 10 minus the rows used
                let pointsEarned = 10 - currentRow;
                score += pointsEarned;
                wordCount++;
                
                $('#wordCount').text(wordCount);
                $('#score').text(score);
                $('#stars').append('★ ');
                
                showMessage("⭐ Excellent!", -1);
                $('#newGameBtn').show();
            } else if (currentRow === 5) {
                isGameOver = true;
                showMessage("Game Over! Word: " + secretWord, -1);
                $('#newGameBtn').show();
            } else {
                currentRow++;
                currentTile = 0;
            }
        }, 800);
    }

    // Helper to flash messages
    function showMessage(msg, duration) {
        $('#message-container').empty();
        let msgEl = $(`<div class="message shadow">${msg}</div>`);
        $('#message-container').append(msgEl);
        if (duration > 0) {
            setTimeout(() => {
                msgEl.css('opacity', '0');
                setTimeout(() => msgEl.remove(), 500);
            }, duration);
        }
    }

    $('#newGameBtn').click(function() {
        $('#message-container').empty();
        resetGame();
    });

});
</script>

</body>
</html>
