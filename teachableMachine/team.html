<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Access Portal</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin-top: 50px; 
            background-color: #f4f4f9;
        }
        #webcam-container { 
            margin: 20px auto; 
            border: 4px solid #ccc; 
            border-radius: 10px;
            width: 200px; 
            height: 200px; 
            display: none; 
            overflow: hidden;
        }
        #message { 
            font-size: 24px; 
            font-weight: bold; 
            margin-top: 20px; 
            color: #333; 
        }
        .denied { color: #d9534f !important; }
        .success { color: #5cb85c !important; }
        button { 
            padding: 12px 24px; 
            font-size: 18px; 
            cursor: pointer; 
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover { background-color: #0056b3; }

        /* --- New Progress Bar Styles --- */
        #label-container {
            width: 80%;
            max-width: 400px;
            margin: 20px auto;
            text-align: left;
        }
        .bar-wrapper {
            margin-bottom: 12px;
        }
        .bar-label {
            font-size: 14px;
            margin-bottom: 5px;
            font-weight: bold;
            color: #444;
        }
        .bar-background {
            background-color: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            height: 20px;
            width: 100%;
        }
        .bar-fill {
            background-color: #007bff;
            height: 100%;
            width: 0%;
            transition: width 0.1s ease-out; /* Smooth snapping animation */
        }
    </style>
</head>
<body>

    <h1>Team Access Portal</h1>
    <button type="button" onclick="init()" id="startBtn">Start Face Scan</button>
    
    <div id="webcam-container"></div>
    
    <div id="label-container"></div>

    <div id="message">Click "Start Face Scan" to verify identity.</div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/XjDx1U4LY/";
        
        let model, webcam, maxPredictions;
        let isScanning = false;

        async function init() {
            document.getElementById("startBtn").style.display = "none";
            document.getElementById("webcam-container").style.display = "block";
            document.getElementById("message").innerText = "Loading model and starting camera...";
            document.getElementById("message").className = "";

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip);
            await webcam.setup();
            await webcam.play();
            
            isScanning = true;
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            document.getElementById("message").innerText = "Scanning face... Please hold still. (10s)";

            // --- Generate Progress Bars dynamically based on loaded model ---
            const labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; 
            
            for (let i = 0; i < maxPredictions; i++) {
                const wrapper = document.createElement("div");
                wrapper.className = "bar-wrapper";

                const label = document.createElement("div");
                label.className = "bar-label";
                label.innerText = model.getClassLabels()[i] + ": 0%";

                const bg = document.createElement("div");
                bg.className = "bar-background";

                const fill = document.createElement("div");
                fill.className = "bar-fill";
                fill.id = "bar-fill-" + i;

                bg.appendChild(fill);
                wrapper.appendChild(label);
                wrapper.appendChild(bg);
                labelContainer.appendChild(wrapper);
            }

            // 10-second timer
            setTimeout(() => {
                if (isScanning) {
                    isScanning = false; 
                    
                    const msgDiv = document.getElementById("message");
                    msgDiv.innerText = "Permission Denied. Face not recognized.";
                    msgDiv.className = "denied";
                    
                    webcam.stop();

                    setTimeout(() => {
                        window.location.href = "https://google.com";
                    }, 2000);
                }
            }, 10000);
        }

        async function loop() {
            if (!isScanning) return;
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            
            // --- 1. Update the visual bars first ---
            for (let i = 0; i < maxPredictions; i++) {
                const percent = Math.round(prediction[i].probability * 100);
                
                const barFill = document.getElementById("bar-fill-" + i);
                if (barFill) {
                    barFill.style.width = percent + "%";
                    
                    // Change the color dynamically based on confidence
                    if (percent >= 90) {
                        barFill.style.backgroundColor = "#5cb85c"; // Green
                    } else {
                        barFill.style.backgroundColor = "#007bff"; // Blue
                    }

                    const wrapper = barFill.parentElement.parentElement;
                    const label = wrapper.querySelector(".bar-label");
                    label.innerText = prediction[i].className + ": " + percent + "%";
                }
            }

            // --- 2. Check for success condition ---
            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].className === "9999-Plain") continue; 

                if (prediction[i].probability >= 0.90) {
                    isScanning = false; 
                    
                    const msgDiv = document.getElementById("message");
                    msgDiv.innerText = `Recognized: ${prediction[i].className}. Access Granted!`;
                    msgDiv.className = "success";
                    
                    webcam.stop();

                    setTimeout(() => {
                        window.location.href = "http://teacherjohn.org";
                    }, 2000);
                    
                    return; 
                }
            }
        }
    </script>
</body>
</html>
