<script>

    $(document).ready(function(){
            $('#clearTeams').on('click', function(){
    if (confirm('Clear team results?')) {
        $.ajax({
                    url: "clearTriangleResults.php",
                    
                    dataType: 'json',
                    
                    contentType: 'application/json',
                    success: function(message) {
                       alert(message) ;
                       console.log("Data cleared");
                    },
                    error: function(data, status, jqXHR) {
                        console.log('There was an error.');
                    }
                });      // end $.ajax
    } else {
      // Do nothing!
      console.log('Tables not cleared.');
    }
    
            })
        })
    </script>
<script>
$(document).ready(function(){
    $('#showResults').on('click', function(){
        var seconds = 5;

        setInterval(function(){
        
            $.ajax({
                url: "triangleShowResults.php",
                
                dataType: 'json',
                
                contentType: 'application/json',
                success: function(data) {
                   $('#results').html(data.html) ; 
                   console.log("Data",data) ;
                   // need to display here
                   $('#resultsBody').empty() ;

                   for (var i = 0 ; i < data.length ; i++)
                    {   team =  data[i]["team"] ;
                        games = data[i]["games"] ;
                        total = data[i]["total"] ;
                        time = data[i]["timeTaken"] ;
                        // console.log("Data",data[i]) ;
                       $('#resultsTable').append('<tr><td>' + team + "</td><td id = 'wordData'>" + games + "</td><td id = 'wordData'>" + total + 
                        "</td><td id = 'totalData'>" + time + '<tr>')
                    }
                },
                error: function(data, status, jqXHR) {
                    console.log('There was an error.');
                }
            });      // end $.ajax
        }, seconds * 1000)
});

})
    </script>
