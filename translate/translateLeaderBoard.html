<script>

$(document).ready(function(){
        $('#clearStudents').on('click', function(){
if (confirm('Clear student results?')) {
    $.ajax({
                url: "clearTranslateResults.php",
                
                dataType: 'json',
                
                contentType: 'application/json',
                success: function(message) {
                   alert(message) ;
                   console.log("Data cleared");
                },
                error: function(data, status, jqXHR) {
                    console.log('There was an error.');
                }
            });      // end $.ajax
} else {
  // Do nothing!
  console.log('Tables not cleared.');
}

        })
    })
</script>

<script>

$(document).ready(function(){
    $('#showResults').on('click', function(){
        var seconds = 5;

        setInterval(function(){
        
            $.ajax({
                url: "translateShowResults.php",
                
                dataType: 'json',
                
                contentType: 'application/json',
                success: function(data) {
                   $('#results').html(data.html) ; 
                   console.log("Data",data) ;
                   // need to display here
                   $('#resultsBody').empty() ;

                   for (var i = 0 ; i < data.length ; i++)
                    {   student =  data[i][0] ;
                        correct = data[i][1] ;
                        wrong = data[i][2] ;
                        percent = data[i][3] + '%' ;
                        console.log("Data",data[i]) ;
                       $('#resultsTable').append('<tr><td>' + student + 
                        "</td><td id = 'wordData'>" + correct + 
                         "</td><td id = 'wordData'>" + wrong + 
                        "</td><td id = 'totalData'>" + percent + '<tr>')
                    }
                },
                error: function(data, status, jqXHR) {
                    console.log('There was an error.');
                }
            });      // end $.ajax
        }, seconds * 1000)
});

})
    </script>
