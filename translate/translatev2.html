<script type="text/javascript">

<script>

function startTimer(duration, display) {
    var timer = duration, minutes, seconds;
    setInterval(function () {
        minutes = parseInt(timer / 60, 10);
        seconds = parseInt(timer % 60, 10);

        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;

        display.text(minutes + ":" + seconds);

        if (--timer < 0) {
            display.text('X' + ":" + 'X');
            $('#gameArea').hide() ;
            $('#words').show() ;
          $('#answers').show() ;
            $('#newGame').show() ;
        }
    }, 1000);
}

</script>

<script>

    $(document).ready(function(){
       $('#check').on('click', function(){

    var guess = $('#guess').val() ;
    var eword = $('#en').text();
    var nonLetters = /[^a-zA-Z]/.test(guess);


    if (guess.length > englishWord.length  )
        {alert('Too many letters! You need ' + englishWord.length);}

     if (guess.length < englishWord.length  )
        {alert('Too few letters! You need ' + englishWord.length);}


     if (nonLetters == true )
        {alert('No question marks allowed!');}

 if (guess.length == englishWord.length  & nonLetters == false)
    {

        if (guess.toLowerCase() == eword.toLowerCase() )
            {
                alert("Win");
                var score = $('#total').text();
                score = parseInt(score) ;
                score++ ;
                mark = 1;
                $('#stars').append('*') ;
                $('#total').text(score);
    } //if
    else
    {
        alert(eword.toLowerCase()) ;
        mark = 0 ;
    }
     writeData(guess,mark);
    $('#guess').val(firstLetter.toLowerCase()) ;
    $('#start').show() ;
    $('#en').show();
    $('#kh').show();
    $('#keyboard').hide() ;
    $('#gameArea').hide() ;// alert('Success') ;
    }

     $.ajax({
    url: 'translatePercent.php',

})
.done(function (response) { 

// alert(response) ;

$('#result').text(data);

}) // ajax success

.fail(function (jqXHR, textStatus, errorThrown) { 
alert("Failure " + jqXHR + ' ' + textStatus + ' error ' + errorThrown) ;


}); // ajax fail



    })
    })
