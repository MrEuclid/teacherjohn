<!DOCTYPE html>
<html lang="en">
<head>


    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Khmer-English Translation</title>
   
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; padding-top: 40px; padding-bottom: 50px; }
        
        .card-container { max-width: 600px; margin: 0 auto; }
        .app-card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: none; }
        
        /* Khmer Text Display */
        .khmer-display { font-size: 3.5rem; font-weight: bold; color: #0d6efd; text-align: center; margin-bottom: 30px; line-height: 1.4; padding: 20px; background: #f8f9fa; border-radius: 15px; border: 2px dashed #dee2e6;}
        
        /* Inputs and Buttons */
        .form-control-lg { font-size: 1.5rem; text-align: center; font-weight: bold; border-radius: 12px; border: 2px solid #ced4da; }
        .form-control-lg:focus { border-color: #0d6efd; box-shadow: 0 0 15px rgba(13, 110, 253, 0.2); }
        .btn-main { height: 60px; font-size: 1.4rem; font-weight: bold; border-radius: 12px; }

        /* Stats Bar */
        .stats-bar { background: #212529; color: white; border-radius: 12px; padding: 15px 20px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .student-name { font-size: 1.2rem; font-weight: bold; color: #0dcaf0; }
        .accuracy-badge { font-size: 1.1rem; background: #198754; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container card-container">

    <div id="loginScreen" class="app-card text-center">
        <h1 class="fw-bold text-primary mb-3">Translation Challenge</h1>
        <p class="text-muted mb-4 fs-5">Enter your Student ID to begin</p>
        
        <div class="mb-4">
            <input type="number" id="studentIdInput" class="form-control form-control-lg" placeholder="e.g. 5001">
        </div>
        
        <p id="loginError" class="text-danger fw-bold" style="display:none;">Invalid Student ID. Please try again.</p>
        <button id="btnLogin" class="btn btn-primary btn-main w-100 shadow-sm">Login & Start</button>
    </div>

    <div id="gameScreen" style="display:none;">
        
        <div class="stats-bar d-flex justify-content-between align-items-center">
            <div class="student-name" id="displayStudentName">Name Here</div>
            <div class="accuracy-badge" id="displayAccuracy">Accuracy: --%</div>
        </div>

        <div class="app-card">
            <h5 class="text-muted text-center fw-bold text-uppercase mb-4">Translate to English</h5>
            
            <div class="khmer-display" id="khmerWord">...</div>
            
            <div class="mb-4">
                <input type="text" id="englishGuess" class="form-control form-control-lg" placeholder="Type English word here" autocomplete="off">
            </div>

            <button id="btnSubmit" class="btn btn-success btn-main w-100 shadow-sm mb-3">Check Translation</button>
            <button id="btnNext" class="btn btn-primary btn-main w-100 shadow-sm" style="display:none;">Next Word ➡️</button>

            <div id="feedbackAlert" class="alert mt-4 fw-bold text-center fs-5" style="display:none;"></div>
        </div>
        
        <div class="text-center mt-4">
            <button id="btnLogout" class="btn btn-outline-secondary fw-bold px-4">Log Out</button>
        </div>
    </div>

</div>

<script>
$(document).ready(function() {
    
    let currentStudentId = null;
    let wordList = [];
    let currentWordIndex = 0;
    let currentWordData = null;

    // --- 1. LOGIN LOGIC ---
    $('#btnLogin').click(function() {
        let sid = $('#studentIdInput').val().trim();
        if(sid === "") return;

        $.ajax({
            url: 'checkStudentID.php',
            type: 'POST',
            data: { studentID: sid },
            dataType: 'json'
        }).done(function(response) {
            if(response.message === "ok") {
                currentStudentId = sid;
                $('#displayStudentName').text(response.First_name + " " + response.Family_name);
                
                $('#loginScreen').hide();
                $('#gameScreen').fadeIn();
                
                updateStudentStats();
                fetchWords(response.Grade || 2); // Default to level 2 if grade not set
            } else {
                $('#loginError').show();
            }
        });
    });

    // --- 2. FETCH WORDS LOGIC ---
    function fetchWords(level) {
        $.ajax({
            url: 'loadTranslationPairs.php',
            type: 'POST',
            data: { level: level },
            dataType: 'json'
        }).done(function(response) {
            wordList = response;
            currentWordIndex = 0;
            loadNextWord();
        }).fail(function() {
            alert("Error loading vocabulary list.");
        });
    }

    function loadNextWord() {
        if(currentWordIndex >= wordList.length) {
            alert("Great job! You finished this set. Loading more...");
            fetchWords(2); // In a real app, you might increment the level here
            return;
        }

        currentWordData = wordList[currentWordIndex];
        $('#khmerWord').text(currentWordData.khmer);
        $('#englishGuess').val('').prop('disabled', false).focus();
        
        $('#feedbackAlert').hide();
        $('#btnSubmit').show();
        $('#btnNext').hide();
    }

    // --- 3. CHECK ANSWER LOGIC ---
    $('#btnSubmit').click(function() {
        let guess = $('#englishGuess').val().trim().toLowerCase();
        if(guess === "") return;

        let correctAnswer = currentWordData.word.toLowerCase();
        let isCorrect = (guess === correctAnswer);
        let mark = isCorrect ? 1 : 0;

        // Visual Feedback
        $('#englishGuess').prop('disabled', true);
        $('#btnSubmit').hide();
        $('#btnNext').show().focus();

        if(isCorrect) {
            $('#feedbackAlert').removeClass('alert-danger').addClass('alert-success').html("✅ Correct! Brilliant job.").fadeIn();
        } else {
            $('#feedbackAlert').removeClass('alert-success').addClass('alert-danger').html(`❌ Incorrect.<br>The correct word is: <span class='text-dark'>${currentWordData.word}</span>`).fadeIn();
        }

        // Write to Database
        $.ajax({
            url: 'writeTranslateDatav2.php',
            type: 'POST',
            data: {
                studentID: currentStudentId,
                khmerWord: currentWordData.khmer,
                englishWord: currentWordData.word,
                guess: guess,
                wordID: currentWordData.id,
                mark: mark
            }
        }).done(function() {
            updateStudentStats(); // Refresh the top bar
        });
    });

    // Next button and Enter Key support
    $('#btnNext').click(function() {
        currentWordIndex++;
        loadNextWord();
    });

    $('#englishGuess').keypress(function(e) {
        if(e.which == 13) { // Enter key
            if($('#btnSubmit').is(':visible')) $('#btnSubmit').click();
            else if($('#btnNext').is(':visible')) $('#btnNext').click();
        }
    });

    // --- 4. UPDATE STATS LOGIC ---
    function updateStudentStats() {
        $.ajax({
            url: 'translatePercent.php',
            type: 'POST',
            data: { studentID: currentStudentId },
            dataType: 'json'
        }).done(function(response) {
            if(response) {
                $('#displayAccuracy').text(`Accuracy: ${response}`);
            }
        });
    }

    $('#btnLogout').click(() => location.reload());

</script>

</body>
</html>
