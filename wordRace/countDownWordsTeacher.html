<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Teacher Leaderboard</title>
   
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    
    <style>
        body { background-color: #212529; color: white; padding-top: 30px; }
        .gold { color: #ffd700; font-weight: bold; }
        .silver { color: #c0c0c0; font-weight: bold; }
        .bronze { color: #cd7f32; font-weight: bold; }
        .score-badge { font-size: 1.8rem; font-weight: bold; padding: 10px 20px;}
        .word-count-badge { font-size: 1.2rem; font-weight: normal; background-color: #495057; }
        .control-panel { max-width: 900px; margin: 0 auto; }
    </style>
</head>
<body>

<div class="container">

    <div class="row mb-3 text-center">
        <div class="col-12">
            <h1 class="fw-bold text-uppercase text-info display-4">Live Leaderboard</h1>
            <h4 class="text-secondary">Word Race Competition</h4>
        </div>
    </div>

    <div class="control-panel d-flex justify-content-end mb-3">
        <button id="exportCsvBtn" class="btn btn-outline-info shadow-sm me-3 fw-bold">⬇ Export CSV</button>
        <button id="clearBtn" class="btn btn-outline-danger shadow-sm fw-bold">🗑 Clear Board</button>
    </div>

    <div class="card bg-dark border-secondary shadow mx-auto" style="max-width: 900px;">
        <div class="card-body p-0">
            <table class="table table-dark table-striped table-hover m-0 fs-3 align-middle text-center">
                <thead>
                    <tr class="text-info">
                        <th>Rank</th>
                        <th class="text-start">Team Name</th>
                        <th>Words Found</th>
                        <th>Total Score</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr><td colspan="4" class="text-center py-4 text-muted">Waiting for teams to submit words...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function() {

    let currentLeaderboardData = []; // Store the data globally for CSV export

    function fetchLeaderboard() {
        $.getJSON('loadLeaderboard.php', function(data) {
            
            currentLeaderboardData = data; // Save it for the export button

            if(data.length === 0) {
                $('#leaderboardBody').html('<tr><td colspan="4" class="text-center py-4 text-muted">Waiting for teams to submit words...</td></tr>');
                return;
            }
            
            $('#leaderboardBody').empty();

            data.forEach((team, index) => {
                let rank = index + 1;
                let rankClass = "";
                let rankDisplay = rank;

                if (rank === 1) { rankClass = "gold"; rankDisplay = "🏆 1st"; }
                else if (rank === 2) { rankClass = "silver"; rankDisplay = "🥈 2nd"; }
                else if (rank === 3) { rankClass = "bronze"; rankDisplay = "🥉 3rd"; }

                let rowHtml = `
                    <tr>
                        <td class="${rankClass}">${rankDisplay}</td>
                        <td class="fw-bold text-light text-start">${team.team}</td>
                        <td><span class="badge word-count-badge shadow-sm">${team.word_count} words</span></td>
                        <td><span class="badge bg-primary score-badge shadow-sm">${team.total_score} pts</span></td>
                    </tr>
                `;
                $('#leaderboardBody').append(rowHtml);
            });
        });
    }

    // Run immediately, then check for new scores every 3 seconds
    fetchLeaderboard();
    setInterval(fetchLeaderboard, 3000);

    // ==========================================
    // EXPORT TO CSV LOGIC
    // ==========================================
    $('#exportCsvBtn').click(function() {
        if (currentLeaderboardData.length === 0) {
            alert("There is no data to export yet!");
            return;
        }

        // Build the CSV headers
        let csvContent = "data:text/csv;charset=utf-8,Rank,Team Name,Words Found,Total Score\n";

        // Loop through the data and build rows
        currentLeaderboardData.forEach(function(team, index) {
            let safeTeamName = team.team.replace(/"/g, '""'); // Protects against commas/quotes in team names
            let row = `${index + 1},"${safeTeamName}",${team.word_count},${team.total_score}`;
            csvContent += row + "\n";
        });

        // Trigger the download
        let encodedUri = encodeURI(csvContent);
        let link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "Word_Race_Results.csv");
        document.body.appendChild(link); // Required for Firefox
        link.click();
        document.body.removeChild(link);
    });

    // ==========================================
    // CLEAR RESULTS LOGIC (Password Protected)
    // ==========================================
    $('#clearBtn').click(function() {
        // Prompt for the password
        let pwd = prompt("Enter teacher password to clear results:");
        
        if (pwd === "pythagoras") {
            // Double check so you don't accidentally wipe a live game
            if (confirm("⚠️ Are you sure? This will permanently delete all current scores!")) {
                
                // Send the password to the secure PHP file
                $.post('clearResults.php', { password: pwd }, function(response) {
                    if (response === "Success") {
                        currentLeaderboardData = []; // Clear local data
                        fetchLeaderboard(); // Update UI immediately
                        alert("The leaderboard has been completely cleared.");
                    } else {
                        alert("Error: Could not clear the database.");
                    }
                });
            }
        } else if (pwd !== null && pwd !== "") {
            alert("❌ Incorrect password.");
        }
    });

});
</script>
</body>
</html>
